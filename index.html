<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const APP_DATA_INITIAL = JSON.parse(document.getElementById('app-data').textContent);
const LS_KEY = "kentiku_estimate_change_v0_1";
const LS_MASTER_KEY = "kentiku_master_change_v0_1";

// ============ ユーティリティ ============
function uuid() {
  return 'id-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36);
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Math.round(n).toLocaleString('ja-JP');
}

// 数量は小数2位で確定し、表示も同じ値を出す（数量×単価＝金額が必ず合うようにする）
function roundQty(n) { return Math.round(n * 100) / 100; }
function fmtQty(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n.toLocaleString('ja-JP', { maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso) return "";
  return iso.slice(0, 10);
}

// 施主名から末尾の敬称(様/さま/殿/御中)を除去して返す
function cleanClientName(name) {
  if (!name) return '';
  return String(name).replace(/[\s　]*(様|さま|サマ|殿|御中)$/, '').trim();
}

// 連番 → アルファベット列コード (1→A, 26→Z, 27→AA, 28→AB, ... 53→BA, ...)
// Excelの列名と同じ規則
function codeFromNumber(n) {
  let s = '';
  while (n > 0) {
    n--;
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26);
  }
  return s;
}

// 使用済みコードを除外して、次に利用可能なカテゴリーコードを返す
// 既存のA,B,...,AB に続けて AC, AD, ... と振る。万一抜けがあっても若い順に詰める。
function nextAvailableCategoryCode(usedCodes) {
  const used = new Set((usedCodes || []).map(c => String(c).toUpperCase()));
  for (let i = 1; i < 10000; i++) {
    const code = codeFromNumber(i);
    if (!used.has(code)) return code;
  }
  // 念のためフォールバック
  return 'X' + Date.now().toString(36).toUpperCase();
}

// ソート用比較: 短いコードを先に、同じ長さなら辞書順 (A < B < ... < Z < AA < AB ...)
function compareCategoryCode(a, b) {
  const sa = String(a || ''); const sb = String(b || '');
  if (sa.length !== sb.length) return sa.length - sb.length;
  return sa < sb ? -1 : sa > sb ? 1 : 0;
}

// 区分(本体工事/付帯工事/諸経費)の並び順ランク。新規追加カテゴリを区分の末尾に配置するために使用。
function sectionRank(category) {
  return category === '本体工事' ? 0 : category === '付帯工事' ? 1 : category === '諸経費' ? 2 : 99;
}

// グループ配列を「区分ごと」に安定ソート(区分内の元の出現順は維持)。
// これにより、末尾に追加された新カテゴリも自分の区分の最後に表示される。
function sortGroupsBySection(groupArray) {
  return groupArray
    .map((grp, i) => ({ grp, i }))
    .sort((a, b) => {
      const ra = sectionRank(a.grp.category);
      const rb = sectionRank(b.grp.category);
      if (ra !== rb) return ra - rb;
      return a.i - b.i; // 同区分内は元の順序を維持(安定ソート)
    })
    .map(x => x.grp);
}

// ============ 計算エンジン ============
function computeScaleParams(input) {
  const t = parseFloat(input.tsuboFloor) || 32;
  const f = parseFloat(input.floorCount) || 2;
  const h = parseFloat(input.eavesHeight) || (f === 1 ? 3.5 : f === 3 ? 9.5 : 6.5);

  // 建物形状 → 不整形係数
  const shapeMap = { "正方形": 1.00, "長方形": 0.89, "L字型": 0.82, "コの字型": 0.76 };
  const buildingShape = input.buildingShape || "長方形";
  const irregularFactor = shapeMap[buildingShape] || 0.89;

  // 建築面積の決定 (優先順: 直接入力 > 1階面積 > 延床÷階数)
  const totalFloorArea = t * 3.3058; // 延床面積㎡
  const baManual = parseFloat(input.buildingAreaInput);
  const f1Manual = parseFloat(input.floor1Area);
  const f2Manual = parseFloat(input.floor2Area);
  const f3Manual = parseFloat(input.floor3Area);

  let buildingArea; // 建築面積=1階の床面積
  let buildingAreaSource = 'auto';
  if (!isNaN(baManual) && baManual > 0) {
    buildingArea = baManual;
    buildingAreaSource = 'direct';
  } else if (!isNaN(f1Manual) && f1Manual > 0) {
    buildingArea = f1Manual;
    buildingAreaSource = 'floor1';
  } else {
    // 階数で均等分配 (粗い概算)
    buildingArea = totalFloorArea / f;
  }

  // 軒高+2.0mを外壁高さとして使用 (足場、外壁、断熱壁の計算用)
  const wallHeight = h + 2.0;

  // 派生値の手動上書き対応
  const autoPerimeter = Math.sqrt(buildingArea) * 4 * irregularFactor;
  const perimeter = (input.manualPerimeter && parseFloat(input.manualPerimeter) > 0)
    ? parseFloat(input.manualPerimeter) : autoPerimeter;

  const autoWallArea = perimeter * wallHeight * 0.75;
  const wallArea = (input.manualWallArea && parseFloat(input.manualWallArea) > 0)
    ? parseFloat(input.manualWallArea) : autoWallArea;

  const roofShapeMap = { "切妻": 1.32, "寄棟": 1.40, "片流れ": 1.20, "陸屋根": 1.05 };
  const roofShape = input.roofShape || "切妻";
  const autoRoofArea = buildingArea * (roofShapeMap[roofShape] || 1.32);
  const roofArea = (input.manualRoofArea && parseFloat(input.manualRoofArea) > 0)
    ? parseFloat(input.manualRoofArea) : autoRoofArea;

  const innerFloorArea = totalFloorArea * 0.80;

  return {
    tsuboFloor: t,
    floorCount: f,
    eavesHeight: h,
    wallHeight,       // 軒高+2.0m (計算用)
    buildingShape,
    irregularFactor,
    roofShape,
    buildingArea,
    perimeter,
    autoPerimeter,
    totalFloorArea,
    wallArea,
    autoWallArea,
    roofArea,
    autoRoofArea,
    innerFloorArea,
    floor1Manual: !isNaN(f1Manual) && f1Manual > 0,
    buildingAreaSource,
    buildingAreaManual: buildingAreaSource !== 'auto',
    perimeterManual: !!(input.manualPerimeter && parseFloat(input.manualPerimeter) > 0),
    wallAreaManual: !!(input.manualWallArea && parseFloat(input.manualWallArea) > 0),
    roofAreaManual: !!(input.manualRoofArea && parseFloat(input.manualRoofArea) > 0)
  };
}

function evalQuantityFormula(formula, sp) {
  if (!formula) return 1;
  let expr = String(formula).replace(/^=/, '').replace(/×/g, '*');
  const vars = {
    "延床坪数": sp.tsuboFloor, "階数": sp.floorCount,
    "軒高": sp.wallHeight,  // 計算式の「軒高」は内部で「外壁高さ(軒高+2.0m)」を使用
    "建築面積": sp.buildingArea, "外周長": sp.perimeter, "延床面積": sp.totalFloorArea,
    "外壁面積": sp.wallArea, "屋根面積": sp.roofArea, "内装床面積": sp.innerFloorArea
  };
  for (const [name, val] of Object.entries(vars)) {
    expr = expr.split(name).join(String(val));
  }
  expr = expr.replace(/IF\(([^,]+),([^,]+),([^)]+)\)/g, (_, cond, t, f) => {
    try { return new Function('return (' + cond + ') ? (' + t + ') : (' + f + ')')(); } catch (e) { return f; }
  });
  try {
    const result = new Function('return ' + expr)();
    return typeof result === 'number' && isFinite(result) ? result : 1;
  } catch (e) { return 1; }
}

function getEffectivePrice(item, manualOverride) {
  if (manualOverride !== undefined && manualOverride !== null && manualOverride !== '') {
    return { price: parseFloat(manualOverride) || 0, source: 'manual' };
  }
  return { price: parseFloat(item.price) || 0, source: 'default' };
}

function computeEstimate(project, masters) {
  const sp = computeScaleParams(project.scale);
  // スナップショットがあればそれを優先、なければマスタを使う(後方互換)
  const effectiveRateMaster = project.rateMasterSnapshot || masters.rateMaster;

  const lines = effectiveRateMaster.map(item => {
    const enabled = !(project.excludedItems || []).includes(item.no) && !item.disabled;
    const autoQuantity = roundQty(evalQuantityFormula(item.quantityFormula, sp));
    const manualQty = (project.manualQuantities || {})[item.no];
    const quantity = (manualQty !== undefined && manualQty !== null && manualQty !== '') ? roundQty(parseFloat(manualQty)) : autoQuantity;
    const quantitySource = (manualQty !== undefined && manualQty !== null && manualQty !== '') ? 'manual' : 'auto';
    const manualOverride = (project.manualPrices || {})[item.no];
    const priceInfo = getEffectivePrice(item, manualOverride);
    const amount = enabled ? Math.round(quantity * priceInfo.price) : 0;
    return { ...item, quantity, autoQuantity, quantitySource, effectivePrice: priceInfo.price, priceSource: priceInfo.source, enabled, masterDisabled: !!item.disabled, amount };
  });

  const customLines = (project.customItems || []).map(c => {
    const qty = c.quantity === '' || c.quantity === null || c.quantity === undefined ? 0 : roundQty(parseFloat(c.quantity) || 0);
    const price = c.price === '' || c.price === null || c.price === undefined ? 0 : (parseFloat(c.price) || 0);
    return {
      no: c.no || ('*-' + (c.id || '').slice(-3)),
      category: c.category || "本体工事",
      categoryGroup: c.categoryGroup || "M",
      categoryName: c.categoryName || "カスタム",
      name: c.name !== undefined && c.name !== null ? c.name : '',
      spec: c.spec !== undefined && c.spec !== null ? c.spec : '',
      quantity: qty,
      autoQuantity: qty,
      quantitySource: 'custom',
      unit: c.unit !== undefined && c.unit !== null ? c.unit : '式',
      effectivePrice: price,
      priceSource: 'custom',
      enabled: c.enabled !== false,
      amount: (c.enabled !== false) ? Math.round(qty * price) : 0,
      isCustom: true,
      customId: c.id,
      remark: c.remark || ""
    };
  });

  const allLines = [...lines, ...customLines];

  // 表示用連番を付与
  // - マスタで無効化された項目はカウントから除外（元の番号を保持、UIでは非表示）
  // - 案件単位で無効化された(enabled=false)項目もカウントから除外
  // - 有効な項目だけに連番を振る
  const displayCounters = {};
  allLines.forEach(l => {
    if (l.masterDisabled || !l.enabled) {
      l.displayNo = l.no; // 表示しない/番号ふらない、内部キーをそのまま使う
      return;
    }
    const g = l.categoryGroup;
    displayCounters[g] = (displayCounters[g] || 0) + 1;
    l.displayNo = `${g}-${displayCounters[g]}`;
  });

  const bodyTotal = allLines.filter(l => l.category === '本体工事').reduce((s, l) => s + l.amount, 0);
  const sideTotal = allLines.filter(l => l.category === '付帯工事').reduce((s, l) => s + l.amount, 0);
  const overheadTotal = allLines.filter(l => l.category === '諸経費').reduce((s, l) => s + l.amount, 0);

  const optionsTotal = (project.options || []).reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
  const rawSubtotal = bodyTotal + sideTotal + overheadTotal + optionsTotal;
  // 端数調整＝「単位を選んだ時点の金額で計算した固定の値引き額」。
  // 固定にすることで、確定後に項目を削除/変更したぶんは丸めに吸収されず、そのまま総額へ反映される。
  const roundingUnit = parseInt((project.rounding && project.rounding.unit) || 0) || 0;
  const roundingAmount = Number((project.rounding && project.rounding.amount) || 0); // ≤0
  let subtotal = rawSubtotal;
  let roundingAdjust = 0;   // 負の値＝お値引き（固定）
  if (roundingUnit > 0 && roundingAmount < 0) {
    roundingAdjust = roundingAmount;
    subtotal = rawSubtotal + roundingAdjust;
    if (subtotal < 0) { subtotal = rawSubtotal; roundingAdjust = 0; }
  }
  const tax = Math.round(subtotal * 0.1);
  const total = subtotal + tax;
  const tsuboCost = sp.tsuboFloor > 0 ? total / sp.tsuboFloor : 0;

  return { scale: sp, lines: allLines, bodyTotal, sideTotal, overheadTotal, optionsTotal, rawSubtotal, roundingUnit, roundingAdjust, subtotal, tax, total, tsuboCost };
}

// 端数調整の単位の選択肢
const ROUNDING_OPTIONS = [
  { v: 0, l: 'なし（端数を切らない）' },
  { v: 100, l: '100円単位で切り捨て' },
  { v: 1000, l: '1,000円単位で切り捨て' },
  { v: 10000, l: '1万円単位で切り捨て' },
  { v: 100000, l: '10万円単位で切り捨て' },
  { v: 1000000, l: '100万円単位で切り捨て' }
];
function roundingLabel(unit) {
  const o = ROUNDING_OPTIONS.find(x => x.v === (parseInt(unit) || 0));
  return o ? o.l : 'なし';
}

// ============ Storage ============
function loadAll() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.properties) parsed.properties = [];
      return parsed;
    }
  } catch (e) {}
  return { projects: [], properties: [], companyInfo: { name: '', address: '', phone: '', email: '', representative: '', stampImage: '' } };
}
function saveAll(state) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { console.error(e); }
}
function loadMasters() {
  try {
    const raw = localStorage.getItem(LS_MASTER_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);

    }

}

// ============ 変更あり/なしの判定（確定後のみ意味を持つ） ============
// baseSnapshot（確定時点）と現在の result/options を突き合わせ、変更の有無と件数を返す。
function diffSummary(project, result) {
  if (!project || project.status !== 'finalized' || !project.baseSnapshot) {
    return { hasChanges: false, counts: { modified: 0, added: 0, deleted: 0, unchanged: 0 }, optChanged: 0 };
  }
  const d = computeDiff(project.baseSnapshot.lines, result.lines);
  // オプション工事の変更も見る
  const baseOpts = project.baseSnapshot.options || [];
  const curOpts = project.options || [];
  const baseMap = new Map(baseOpts.map(o => [o.id, o]));
  const curMap = new Map(curOpts.map(o => [o.id, o]));
  let optChanged = 0;
  baseMap.forEach((bo, id) => {
    const co = curMap.get(id);
    if (!co) optChanged++;
    else if (bo.name !== co.name || Number(bo.amount) !== Number(co.amount)) optChanged++;
  });
  curMap.forEach((co, id) => { if (!baseMap.has(id)) optChanged++; });
  const lineChanges = d.counts.modified + d.counts.added + d.counts.deleted;
  return { hasChanges: (lineChanges + optChanged) > 0, counts: d.counts, optChanged };
}

// ============ 状態バッジ ============
// 作成中（draft）はバッジなし＝null。確定後のみ「確定済」または「変更あり」を出す。
function StatusBadge({ project, result, masters, size = 'sm' }) {
  if (!project) return null;
  if (project.status !== 'finalized') return null;   // 作成中は無印
  const cls = size === 'lg' ? 'px-3 py-1 text-sm' : 'px-2 py-0.5 text-xs';
  // result が渡されていなければ自前で計算（一覧カード用）
  const r = result || (masters ? computeEstimate(project, masters) : null);
  const changed = r ? diffSummary(project, r).hasChanges : false;
  if (changed) {
    return <span className={`${cls} rounded font-semibold bg-orange-100 text-orange-800 border border-orange-300`}>🟧 変更あり</span>;
  }
  return <span className={`${cls} rounded font-semibold bg-blue-100 text-blue-800 border border-blue-300`}>🟢 確定済</span>;
}

// ============ 差分計算（変更見積書用） ============
// baseSnapshot.lines（原本確定時）と現在の result.lines を突き合わせ、
// 各行を「unchanged/modified/added/deleted」で分類して返す。
// 表示・比較に使う実単価（手動上書き後）。effectivePrice を優先し、無ければ price。
function lineUnitPrice(l) {
  if (!l) return 0;
  return (l.effectivePrice !== undefined && l.effectivePrice !== null) ? l.effectivePrice : (l.price || 0);
}
function computeDiff(baseLines, currentLines) {
  // 項目番号(no)＋カテゴリで対応付け。名前を変えても「変更」として扱えるよう name はキーに含めない。
  const keyOf = (l) => `${l.categoryGroup || ''}__${l.no || ''}`;
  const baseMap = new Map();
  (baseLines || []).forEach(l => {
    if (!l.enabled) return;
    if ((l.amount || 0) <= 0) return;
    baseMap.set(keyOf(l), l);
  });
  const curMap = new Map();
  (currentLines || []).forEach(l => {
    if (!l.enabled) return;
    if ((l.amount || 0) <= 0) return;
    curMap.set(keyOf(l), l);
  });

  const rows = [];
  // baseを基準にした並びで比較
  baseMap.forEach((bl, k) => {
    const cl = curMap.get(k);
    if (!cl) {
      rows.push({ status: 'deleted', before: bl, after: null, categoryGroup: bl.categoryGroup, categoryName: bl.categoryName, category: bl.category });
    } else {
      const changed = (bl.name !== cl.name) || (bl.spec !== cl.spec)
        || (Number(bl.quantity || 0) !== Number(cl.quantity || 0))
        || (Number(lineUnitPrice(bl)) !== Number(lineUnitPrice(cl)))
        || (Number(bl.amount || 0) !== Number(cl.amount || 0));
      rows.push({ status: changed ? 'modified' : 'unchanged', before: bl, after: cl, categoryGroup: cl.categoryGroup, categoryName: cl.categoryName, category: cl.category });
    }
  });
  // baseにない＝追加
  curMap.forEach((cl, k) => {
    if (!baseMap.has(k)) {
      rows.push({ status: 'added', before: null, after: cl, categoryGroup: cl.categoryGroup, categoryName: cl.categoryName, category: cl.category });
    }
  });

  // 区分→カテゴリグループの順で整列
  rows.sort((a, b) => {
    const ra = sectionRank(a.category); const rb = sectionRank(b.category);
    if (ra !== rb) return ra - rb;
    return compareCategoryCode(a.categoryGroup, b.categoryGroup);
  });

  // 集計
  const beforeTotal = Array.from(baseMap.values()).reduce((s, l) => s + (l.amount || 0), 0);
  const afterTotal = Array.from(curMap.values()).reduce((s, l) => s + (l.amount || 0), 0);
  const counts = { unchanged: 0, modified: 0, added: 0, deleted: 0 };
  rows.forEach(r => { counts[r.status] = (counts[r.status] || 0) + 1; });

  return { rows, beforeTotal, afterTotal, diff: afterTotal - beforeTotal, counts };
}

// ============ Components ============
// ===== 画面内ダイアログ（素のブラウザalert/prompt/confirmの置き換え・質感統一＋スマホ対応） =====
let _openDialog = null;
function _normDlg(opts) { return (typeof opts === 'string') ? { message: opts } : (opts || {}); }
function uiAlert(opts)   { return new Promise(res => { if (_openDialog) _openDialog({ kind: 'alert',   ..._normDlg(opts), resolve: () => res() }); else { alert(_normDlg(opts).message || ''); res(); } }); }
function uiConfirm(opts) { return new Promise(res => { if (_openDialog) _openDialog({ kind: 'confirm', ..._normDlg(opts), resolve: res }); else res(confirm(_normDlg(opts).message || '')); }); }
function uiPrompt(opts)  { return new Promise(res => { if (_openDialog) _openDialog({ kind: 'prompt',  ..._normDlg(opts), resolve: res }); else res(prompt(_normDlg(opts).message || '', _normDlg(opts).defaultValue || '')); }); }

function DialogHost() {
  const [d, setD] = useState(null);
  const [val, setVal] = useState('');
  const inputRef = useRef(null);
  useEffect(() => { _openDialog = (cfg) => { setVal(cfg.defaultValue || ''); setD(cfg); }; return () => { _openDialog = null; }; }, []);
  useEffect(() => { if (d && d.kind === 'prompt' && inputRef.current) inputRef.current.focus(); }, [d]);
  if (!d) return null;
  const done = (result) => { const r = d.resolve; setD(null); if (r) r(result); };
  const onCancel = () => done(d.kind === 'confirm' ? false : (d.kind === 'prompt' ? null : undefined));
  const onOk = () => { if (d.kind === 'confirm') done(true); else if (d.kind === 'prompt') done(val); else done(); };
  const handleKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
    else if (e.key === 'Enter' && d.kind !== 'alert') { e.preventDefault(); onOk(); }
  };
  const okText = d.confirmText || (d.kind === 'alert' ? '閉じる' : 'OK');
  const btnBg = d.danger ? '#B91C1C' : '#C85400';
  return (
    <div className="fixed inset-0 bg-slate-900/40 flex items-center justify-center p-4 no-print"
      style={{ zIndex: 100000 }} onClick={onCancel} onKeyDown={handleKey}>
      <div className="bg-white rounded-lg shadow-xl max-w-md w-full border border-slate-300"
        onClick={e => e.stopPropagation()}>
        {(d.title || d.kind === 'confirm') && (
          <div className="px-5 py-3 border-b border-slate-200">
            <h3 className="text-base font-bold text-slate-900">{d.title || '確認'}</h3>
          </div>
        )}
        <div className="px-5 py-4">
          {d.message && <p className="text-sm text-slate-700 whitespace-pre-line leading-relaxed">{d.message}</p>}
          {d.kind === 'prompt' && (
            <input ref={inputRef} type="text" value={val} onChange={e => setVal(e.target.value)}
              placeholder={d.placeholder || ''} lang="ja"
              className="mt-3 w-full border border-slate-300 rounded-lg px-3 text-base focus:outline-none focus:border-blue-500"
              style={{ minHeight: '48px' }} />
          )}
        </div>
        <div className="px-5 py-3 border-t border-slate-200 flex justify-end gap-2">
          {d.kind !== 'alert' && (
            <button type="button" onClick={onCancel}
              className="px-4 rounded-lg border border-slate-300 text-slate-700 font-bold hover:bg-slate-50"
              style={{ minHeight: '48px' }}>{d.cancelText || 'キャンセル'}</button>
          )}
          <button type="button" onClick={onOk} autoFocus={d.kind !== 'prompt'}
            className="px-5 rounded-lg font-bold text-white"
            style={{ minHeight: '48px', backgroundColor: btnBg }}>{okText}</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(loadAll);
  const [masters, setMasters] = useState(loadMasters);
  const [view, setView] = useState({ name: 'property-list' });
  const [savedAt, setSavedAt] = useState(null);

  useEffect(() => { saveAll(state); setSavedAt(new Date()); }, [state]);
  useEffect(() => { saveMasters(masters); }, [masters]);

  const updateProject = (id, updater) => {
    setState(s => ({
      ...s,
      projects: s.projects.map(p =>
        p.id === id ? { ...updater(p), updatedAt: new Date().toISOString() } : p
      )
    }));
  };

  // 物件のみ新規登録 (見積は作らない)
  const addProperty = async () => {
    const name = await uiPrompt({ title: '物件の登録', message: '物件名を入力してください', placeholder: '例：田中様邸 新築工事' });
    if (!name) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    // 既存物件名と重複チェック
    const exists = (state.properties || []).some(prop => prop.name === trimmed) ||
                   state.projects.some(p => p.propertyName === trimmed);
    if (exists) { await uiAlert('同名の物件が既に存在します'); return; }
    setState(s => ({
      ...s,
      properties: [...(s.properties || []), { name: trimmed, createdAt: new Date().toISOString() }]
    }));
    // 登録後、その物件の見積一覧に遷移
    setView({ name: 'list', propertyName: trimmed });
  };

  // 指定した物件で新規見積を作る
  const addProjectForProperty = (propertyName) => {
    // 同じ物件の見積数を数えて名前を決める
    const sameCount = state.projects.filter(p => (p.propertyName || '') === (propertyName || '')).length;
    const newName = sameCount === 0 ? '第1回見積' : `第${sameCount + 1}回見積`;
    const p = defaultProject(newName, masters);
    p.propertyName = propertyName || '';
    p.revisionNumber = sameCount + 1;
    setState(s => ({ ...s, projects: [p, ...s.projects] }));
    setView({ name: 'edit', id: p.id });
  };

  const duplicateProject = (id) => {
    const orig = state.projects.find(p => p.id === id); if (!orig) return;
    const propertyKey = orig.propertyName || orig.id;
    const sameCount = state.projects.filter(p => (p.propertyName || p.id) === propertyKey).length;
    const copy = {
      ...JSON.parse(JSON.stringify(orig)),
      id: uuid(),
      revisionNumber: sameCount + 1,
      name: `第${sameCount + 1}回見積`,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      // 複製は新しい「作成中」の見積として開始（確定情報は引き継がない）
      status: 'draft',
      finalizedAt: null,
      finalizedTotal: null,
      baseSnapshot: null,
      printKind: null
    };
    setState(s => ({ ...s, projects: [copy, ...s.projects] }));
  };

  // この見積を「確定」する：基準スナップショットを保存し、以後の編集を「変更」として扱う（変更モードに入る）
  const finalizeProject = async (id) => {
    const p = state.projects.find(x => x.id === id);
    if (!p) return;
    if (p.status === 'finalized') { await uiAlert('この見積は既に確定済みです'); return; }
    const r = computeEstimate(p, masters);
    const label = `確定すると「変更モード」に入ります。\n・このあと内容を変えなければ、確定した見積書がそのまま使えます\n・内容を変えると、変更見積書（変更前→変更後）が出せます\n\n税込総額：¥${fmt(r.total)}`;
    if (!await uiConfirm({ title: 'この見積を確定しますか？', message: label, confirmText: '確定する' })) return;
    updateProject(id, p => ({
      ...p,
      status: 'finalized',
      finalizedAt: new Date().toISOString(),
      finalizedTotal: r.total,
      printKind: null,
      // 確定時点のスナップショット（変更前＝差分のベース）
      baseSnapshot: {
        finalizedAt: new Date().toISOString(),
        scale: JSON.parse(JSON.stringify(p.scale)),
        lines: JSON.parse(JSON.stringify(r.lines)),
        options: JSON.parse(JSON.stringify(p.options || [])),
        totals: { subtotal: r.subtotal, tax: r.tax, total: r.total, bodyTotal: r.bodyTotal, sideTotal: r.sideTotal, overheadTotal: r.overheadTotal, optionsTotal: r.optionsTotal }
      }
    }));
  };

  // 確定をもどす：作成中に戻す。変更モードでの変更は通常の見積に取り込まれ、変更前との比較はできなくなる。
  const unfinalizeProject = async (id) => {
    const p = state.projects.find(x => x.id === id);
    if (!p) return;
    if (!await uiConfirm({ title: '確定をもどしますか？', message: '「確定」をもどして、作成中の状態に戻します。\n\n⚠️ ご注意：\n・確定後に変更した内容は、そのまま通常の見積に取り込まれます\n・「変更前 → 変更後」の比較（変更見積書）は出せなくなります', confirmText: '確定をもどす', danger: true })) return;
    updateProject(id, p => ({ ...p, status: 'draft', finalizedAt: null, finalizedTotal: null, baseSnapshot: null, printKind: null }));
  };
  const deleteProject = async (id) => {
    if (!await uiConfirm({ title: '見積の削除', message: 'この見積を削除しますか？', confirmText: '削除する', danger: true })) return;
    setState(s => ({ ...s, projects: s.projects.filter(p => p.id !== id) }));
  };
  const renameProject = async (id) => {
    const p = state.projects.find(x => x.id === id);
    const newName = await uiPrompt({ title: '見積名の変更', message: '見積名を入力してください', defaultValue: p?.name || '' }); if (!newName) return;
    updateProject(id, p => ({ ...p, name: newName }));
  };
  const refreshSnapshot = async (id) => {
    const p = state.projects.find(x => x.id === id);
    if (!p) return;
    const itemCount = masters.rateMaster.length;
    const oldCount = (p.rateMasterSnapshot || []).length;
    if (!await uiConfirm({ title: '単価マスタを最新に更新', message: `この見積の単価マスタを最新版（${itemCount}項目）に更新しますか？\n\n現在この見積に取り込まれているマスタ: ${oldCount}項目\n${p.snapshotAt ? `取り込み日時: ${fmtDate(p.snapshotAt)}` : '(未取り込み)'}\n\n※ 手動編集した数量・単価はそのまま残ります。\n※ カスタム追加項目もそのまま残ります。`, confirmText: '更新する' })) return;
    updateProject(id, p => ({
      ...p,
      rateMasterSnapshot: JSON.parse(JSON.stringify(masters.rateMaster)),
      snapshotAt: new Date().toISOString()
    }));
    await uiAlert('マスタを最新に更新しました。');
  };
  const deleteProperty = async (propName) => {
    if (!await uiConfirm({ title: '物件の削除', message: `「${propName}」と、その物件のすべての見積を削除しますか？\nこの操作は取り消せません。`, confirmText: '削除する', danger: true })) return;
    setState(s => ({
      ...s,
      properties: (s.properties || []).filter(prop => prop.name !== propName),
      projects: s.projects.filter(p => (p.propertyName || '(物件名なし)') !== propName)
    }));
  };
  const renameProperty = async (oldName) => {
    const newName = await uiPrompt({ title: '物件名の変更', message: '物件名を入力してください', defaultValue: oldName === '(物件名なし)' ? '' : oldName });
    if (newName === null) return;
    const trimmed = newName.trim();
    setState(s => ({
      ...s,
      properties: (s.properties || []).map(prop =>
        prop.name === oldName ? { ...prop, name: trimmed } : prop
      ),
      projects: s.projects.map(p =>
        (p.propertyName || '(物件名なし)') === oldName
          ? { ...p, propertyName: trimmed, updatedAt: new Date().toISOString() }
          : p
      )
    }));
  };

  return (
    <div className="min-h-screen flex flex-col">
      <DialogHost />
      <Header view={view} setView={setView} savedAt={savedAt} />
      <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
        {view.name === 'property-list' && (
          <PropertyList projects={state.projects} properties={state.properties || []} masters={masters}
            onOpen={(propName) => setView({ name: 'list', propertyName: propName })}
            onAddProperty={addProperty}
            onDeleteProperty={deleteProperty}
            onRenameProperty={renameProperty} />
        )}
        {view.name === 'list' && (
          <ProjectList projects={state.projects} masters={masters}
            propertyFilter={view.propertyName}
            onBack={() => setView({ name: 'property-list' })}
            onOpen={id => setView({ name: 'edit', id })}
            onAdd={() => addProjectForProperty(view.propertyName === '(物件名なし)' ? '' : view.propertyName)}
            onDuplicate={duplicateProject}
            onFinalize={finalizeProject}
            onDelete={deleteProject} onRename={renameProject}
            onUpdateMemo={(id, memo) => updateProject(id, p => ({ ...p, memo }))} />
        )}
        {view.name === 'edit' && (
          <ProjectEditor
            project={state.projects.find(p => p.id === view.id)}
            masters={masters}
            companyInfo={state.companyInfo}
            allProjects={state.projects}
            onChange={updater => updateProject(view.id, updater)}
            onRefreshSnapshot={() => refreshSnapshot(view.id)}
            onFinalize={() => finalizeProject(view.id)}
            onUnfinalize={() => unfinalizeProject(view.id)}
            onOpenProject={(id) => setView({ name: 'edit', id })}
            onGoSettings={() => setView({ name: 'settings' })}
            onBack={() => {
              const p = state.projects.find(p => p.id === view.id);
              setView({ name: 'list', propertyName: p?.propertyName || '(物件名なし)' });
            }} />
        )}
        {view.name === 'masters' && (
          <MasterManager masters={masters} setMasters={setMasters} />
        )}
        {view.name === 'settings' && (
          <Settings state={state} setState={setState} masters={masters} setMasters={setMasters} />
        )}
      </main>
      <footer className="border-t border-slate-200 bg-white text-xs text-slate-500 py-4 text-center no-print">
        <span className="font-bold ha-navy-text">HEALTH <span className="ha-orange">ARCHI</span></span>　スマート見積（変更見積・実験版）/ データはお使いのブラウザ内に保存されます / 初期値: 2026年5月 首都圏中級32坪 標準仕様
      </footer>
    </div>
  );
}

function Header({ view, setView, savedAt }) {
  const navs = [
    { id: 'property-list', label: '物件一覧', icon: '📁' },
    { id: 'masters', label: 'マスタ管理', icon: '⚙️' },
    { id: 'settings', label: '設定', icon: '🔧' }
  ];
  return (
    <header className="no-print text-white shadow-md" style={{ backgroundColor: '#1B2B4B' }}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between flex-wrap gap-2">
        <div className="flex items-center gap-2 min-w-0">
          <span className="font-bold text-lg tracking-wide whitespace-nowrap">HEALTH <span style={{ color: '#F08300' }}>ARCHI</span></span>
          <span className="text-slate-300 text-sm truncate">｜スマート見積システム（木造在来工法専用）</span>
        </div>
        <nav className="flex gap-1 items-center">
          {navs.map(n => {
            const isActive = view.name === n.id ||
              (n.id === 'property-list' && (view.name === 'list' || view.name === 'edit'));
            return (
              <button key={n.id} onClick={() => setView({ name: n.id })}
                className={`px-3 py-2 text-sm rounded font-medium transition ${
                  isActive ? 'bg-white text-[#1B2B4B] font-bold' : 'text-white/90 hover:bg-white/10'
                }`} style={{ minHeight: '44px' }}>
                <span className="mr-1">{n.icon}</span>
                <span className="hidden sm:inline">{n.label}</span>
              </button>
            );
          })}
          <a href="guide.html" target="_blank" rel="noopener"
            className="border border-white/40 hover:bg-white/10 text-white text-sm font-medium px-3 py-2 rounded whitespace-nowrap flex items-center gap-1"
            style={{ minHeight: '44px' }}
            title="新しいタブで使い方ガイドを開く">
            <span>📖</span>
            <span className="hidden sm:inline">使い方ガイド</span>
          </a>
        </nav>
        {savedAt && (
          <div className="text-xs text-slate-300 w-full sm:w-auto sm:order-last text-right">
            💾 自動保存: {savedAt.toLocaleTimeString('ja-JP')}
          </div>
        )}
      </div>
    </header>
  );
}

function PropertyList({ projects, properties, masters, onOpen, onAddProperty, onDeleteProperty, onRenameProperty }) {
  // 物件名でグループ化（properties 配列 + projects から集計）
  const propMap = useMemo(() => {
    const g = {};
    // properties から先に登録 (見積0件でも表示)
    (properties || []).forEach(prop => {
      g[prop.name] = { name: prop.name, projects: [], latestUpdate: prop.createdAt, clientName: '', latestTotal: 0, latestEstimate: null };
    });
    // projects から追加
    projects.forEach(p => {
      const key = p.propertyName || '(物件名なし)';
      if (!g[key]) g[key] = { name: key, projects: [], latestUpdate: '', clientName: '' };
      g[key].projects.push(p);
      if (!g[key].latestUpdate || p.updatedAt > g[key].latestUpdate) {
        g[key].latestUpdate = p.updatedAt;
        g[key].clientName = p.clientName || g[key].clientName;
      }
    });
    // 最新見積の総額
    Object.values(g).forEach(prop => {
      if (prop.projects.length > 0) {
        const sorted = [...prop.projects].sort((a, b) => (b.revisionNumber || 1) - (a.revisionNumber || 1));
        const latest = sorted[0];
        prop.latestEstimate = latest;
        prop.latestTotal = computeEstimate(latest, masters).total;
      }
    });
    return Object.values(g).sort((a, b) => (b.latestUpdate || '').localeCompare(a.latestUpdate || ''));
  }, [projects, properties, masters]);

  return (
    <div>
      <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
        <div>
          <h2 className="text-xl sm:text-2xl font-bold text-slate-900">物件一覧</h2>
          <p className="text-sm text-slate-500 mt-1">登録物件: {propMap.length} 件 / 見積: {projects.length} 件</p>
        </div>
        <button onClick={onAddProperty} className="px-5 text-sm ha-cta text-white font-bold rounded-lg" style={{ minHeight: '48px' }}>＋ 物件の登録</button>
      </div>
      {propMap.length === 0 ? (
        <div className="bg-white border border-slate-200 rounded-lg p-12 text-center">
          <p className="text-slate-500">物件がまだ登録されていません</p>
          <p className="text-xs text-slate-400 mt-2">右上の「＋ 物件の登録」から始めてください</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {propMap.map(prop => (
            <div key={prop.name} className="border border-slate-200 rounded-lg bg-white overflow-hidden hover:border-slate-400 transition">
              <div onClick={() => onOpen(prop.name)} className="p-4 cursor-pointer">
                <div className="flex items-center justify-between mb-1">
                  <div className="text-xs text-slate-500">{prop.latestUpdate ? `最終更新: ${fmtDate(prop.latestUpdate)}` : '新規物件'}</div>
                  <span className="text-xs bg-amber-50 text-amber-700 px-2 py-0.5 rounded font-semibold">
                    {prop.projects.length === 0 ? '見積なし' : `${prop.projects.length} 件の見積`}
                  </span>
                </div>
                <h4 className="font-bold text-slate-900 text-base truncate flex items-center gap-1">
                  🏠 {prop.name}
                </h4>
                {prop.clientName && (
                  <p className="text-xs text-slate-500 mt-1 truncate">{cleanClientName(prop.clientName)} 様</p>
                )}
                {prop.latestEstimate && prop.latestEstimate.status === 'finalized' && (
                  <div className="mt-1"><StatusBadge project={prop.latestEstimate} masters={masters} /></div>
                )}
                <div className="mt-3 pt-3 border-t border-slate-100">
                  {prop.latestEstimate ? (
                    <>
                      <div className="text-xs text-slate-500">最新見積</div>
                      <div className="num text-lg font-bold text-slate-900 mt-0.5">
                        {fmt(prop.latestTotal)}<span className="text-sm font-normal text-slate-500 ml-1">円(税込)</span>
                      </div>
                    </>
                  ) : (
                    <div className="text-xs text-slate-400">クリックして見積を作成</div>
                  )}
                </div>
              </div>
              <div className="border-t border-slate-100 flex divide-x divide-slate-100 text-xs">
                <button onClick={(e) => { e.stopPropagation(); onRenameProperty(prop.name); }}
                  className="flex-1 py-2 hover:bg-slate-50 text-slate-600">物件名変更</button>
                <button onClick={(e) => { e.stopPropagation(); onDeleteProperty(prop.name); }}
                  className="flex-1 py-2 hover:bg-red-50 text-red-600">物件削除</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ProjectList({ projects, masters, propertyFilter, onBack, onOpen, onAdd, onDuplicate, onFinalize, onDelete, onRename, onUpdateMemo }) {
  // 指定された物件名の見積だけ抽出
  const filtered = useMemo(() => {
    return projects
      .filter(p => (p.propertyName || '(物件名なし)') === propertyFilter)
      .sort((a, b) => (a.revisionNumber || 1) - (b.revisionNumber || 1));
  }, [projects, propertyFilter]);

  return (
    <div>
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <button onClick={onBack} className="text-sm text-slate-600 hover:text-slate-900">← 物件一覧へ</button>
      </div>
      <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
        <div>
          <div className="text-xs text-slate-500 mb-1">🏠 物件</div>
          <h2 className="text-xl sm:text-2xl font-bold text-slate-900">{propertyFilter}</h2>
          <p className="text-sm text-slate-700 mt-2 font-semibold">📄 見積一覧 <span className="text-slate-500 font-normal">({filtered.length} 件)</span></p>
        </div>
        <button onClick={onAdd} className="px-5 text-sm ha-cta text-white font-bold rounded-lg" style={{ minHeight: '48px' }}>＋ この物件で新規見積</button>
      </div>
      {filtered.length === 0 ? (
        <div className="bg-white border border-slate-200 rounded-lg p-12 text-center">
          <p className="text-slate-500">この物件にはまだ見積がありません</p>
          <button onClick={onAdd} className="mt-4 px-5 ha-cta text-white font-bold rounded-lg text-sm" style={{ minHeight: '48px' }}>最初の見積を作る</button>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(p => {
            const r = computeEstimate(p, masters);
            return (
              <div key={p.id} className="border border-slate-200 rounded-lg bg-white overflow-hidden hover:border-slate-400 transition flex flex-col">
                <div onClick={() => onOpen(p.id)} className="p-4 cursor-pointer">
                  <div className="flex items-center justify-between mb-1 gap-2">
                    <div className="text-xs text-slate-500">{fmtDate(p.updatedAt)} 更新</div>
                    <StatusBadge project={p} result={r} />
                  </div>
                  <h4 className="font-semibold text-slate-900 truncate">{p.name}</h4>
                  <p className="text-xs text-slate-500 mt-1 truncate">
                    {p.scale.tsuboFloor}坪・{p.scale.floorCount}階建
                    {p.clientName && ` / ${cleanClientName(p.clientName)}様`}
                  </p>
                  <div className="mt-3 pt-3 border-t border-slate-100">
                    <div className="text-xs text-slate-500">税込総額</div>
                    <div className="num text-xl font-bold text-slate-900 mt-0.5">
                      {fmt(r.total)}<span className="text-sm font-normal text-slate-500 ml-1">円</span>
                    </div>
                    {p.status === 'finalized' && p.baseSnapshot && diffSummary(p, r).hasChanges && (
                      <div className="mt-1 text-xs text-orange-700">
                        {(() => {
                          const d = r.total - (p.baseSnapshot.totals?.total || 0);
                          const sign = d >= 0 ? '+' : '−';
                          return <>変更差額：<span className="num font-bold">{sign}¥{fmt(Math.abs(d))}</span></>;
                        })()}
                      </div>
                    )}
                  </div>
                </div>
                {/* メモ欄 */}
                <div className="px-4 pb-2">
                  <div className="text-xs text-slate-500 mb-1 flex items-center gap-1">
                    <span>📝 メモ</span>
                    <span className="text-slate-400 text-[10px]">(進捗・状況など)</span>
                  </div>
                  <textarea
                    value={p.memo || ''}
                    onChange={e => onUpdateMemo(p.id, e.target.value)}
                    onClick={e => e.stopPropagation()}
                    placeholder="例: 打ち合わせ前/提案中/契約待ち..."
                    rows="2"
                    className="w-full text-xs border border-slate-200 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-2 py-1 resize-none"
                  />
                </div>
                {p.status === 'draft' && (
                  <div className="px-4 pb-2">
                    <button onClick={(e) => { e.stopPropagation(); onFinalize(p.id); }}
                      className="w-full py-2 text-xs font-semibold text-white rounded" style={{ backgroundColor: '#1B2B4B' }}>
                      ✓ この見積を確定する
                    </button>
                  </div>
                )}
                {p.status === 'finalized' && (
                  <div className="px-4 pb-2">
                    <button onClick={(e) => { e.stopPropagation(); onOpen(p.id); }}
                      className="w-full py-2 text-xs font-semibold bg-orange-600 text-white rounded hover:bg-orange-700">
                      開いて変更する（変更モード）
                    </button>
                  </div>
                )}
                <div className="border-t border-slate-100 flex divide-x divide-slate-100 text-xs mt-auto">
                  <button onClick={() => onRename(p.id)} className="flex-1 py-2 hover:bg-slate-50 text-slate-600">改名</button>
                  <button onClick={() => onDuplicate(p.id)} className="flex-1 py-2 hover:bg-slate-50 text-slate-600">複製</button>
                  <button onClick={() => onDelete(p.id)} className="flex-1 py-2 hover:bg-red-50 text-red-600">削除</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ProjectEditor({ project, masters, companyInfo, allProjects, onChange, onBack, onRefreshSnapshot, onFinalize, onUnfinalize, onOpenProject, onGoSettings }) {
  const [tab, setTab] = useState('scale');
  if (!project) return <div>見積が見つかりません</div>;
  const result = useMemo(() => computeEstimate(project, masters), [project, masters]);
  const isFinalized = project.status === 'finalized';
  const ds = useMemo(() => diffSummary(project, result), [project, result]);
  const changed = isFinalized && ds.hasChanges;
  const baseTotal = project.baseSnapshot?.totals?.total || 0;

  // 既存データ救済：確定後に規模が確定時とズレていたら、確定時の規模へ自動で戻す
  // （確定後に規模を触ってしまい、規模依存の数量が全項目「変更」扱いになる事故を解消）
  useEffect(() => {
    if (isFinalized && project.baseSnapshot && project.baseSnapshot.scale) {
      if (JSON.stringify(project.scale) !== JSON.stringify(project.baseSnapshot.scale)) {
        onChange(p => ({ ...p, scale: JSON.parse(JSON.stringify(p.baseSnapshot.scale)) }));
      }
    }
  }, [project.id, isFinalized]);

  const tabs = [
    { id: 'scale', label: '1. 規模' },
    { id: 'details', label: '2. 内訳明細' },
    { id: 'result', label: '3. 結果' },
    { id: 'print', label: '🖨 帳票プレビュー' }
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-3 no-print flex-wrap gap-2">
        <button onClick={onBack} className="text-sm text-slate-600 hover:text-slate-900">← この物件の見積一覧へ</button>
        <div className="text-xs text-slate-500">最終更新: {fmtDate(project.updatedAt)}</div>
      </div>

      {/* ★ 状態帯：作成中=無印グレー／確定済=青／変更あり=オレンジ */}
      <div className={`rounded-lg border p-4 mb-3 no-print flex items-center justify-between flex-wrap gap-3 ${
        changed ? 'bg-orange-50 border-orange-300' :
        isFinalized ? 'bg-blue-50 border-blue-300' :
        'bg-slate-50 border-slate-300'
      }`}>
        <div className="flex items-center gap-3 flex-wrap">
          {!isFinalized && (
            <span className="px-3 py-1 text-sm rounded font-semibold bg-slate-200 text-slate-700 border border-slate-300">✏️ 作成中</span>
          )}
          {isFinalized && <StatusBadge project={project} result={result} size="lg" />}
          {!isFinalized && (
            <span className="text-xs text-slate-600">内容が固まったら【この見積を確定】を押すと、ここから変更モードに入ります。</span>
          )}
          {isFinalized && !changed && (
            <span className="text-xs text-blue-800">確定日：{fmtDate(project.finalizedAt)}　確定総額 ¥{fmt(baseTotal)}</span>
          )}
          {changed && (
            <span className="text-xs text-orange-800">
              変更前 ¥{fmt(baseTotal)} → 変更後 ¥{fmt(result.total)}（
              {(() => { const d = result.total - baseTotal; return (d >= 0 ? '＋' : '−') + '¥' + fmt(Math.abs(d)); })()}
              ）
            </span>
          )}
        </div>
        <div className="flex gap-2">
          {!isFinalized && (
            <button onClick={onFinalize}
              className="px-5 text-sm font-bold ha-cta text-white rounded-lg" style={{ minHeight: '48px' }}>
              ✓ この見積を確定
            </button>
          )}
          {isFinalized && (
            <button onClick={onUnfinalize}
              className="px-3 py-2 text-xs text-slate-500 border border-slate-300 rounded hover:bg-slate-100"
              title="確定をもどして作成中に戻す">
              確定をもどす
            </button>
          )}
        </div>
      </div>

      {/* ★ 変更モードの案内（確定後のみ） */}
      {isFinalized && !changed && (
        <div className="bg-blue-50 border border-blue-200 text-blue-900 rounded p-3 mb-3 no-print text-sm">
          🔁 <strong>変更モードです。</strong>このまま内容を変えなければ「確定した見積書」がそのまま使えます。金額や項目を変えると、その差分が<strong>変更見積書（変更前→変更後）</strong>になります。
        </div>
      )}
      {changed && (
        <div className="bg-orange-50 border border-orange-300 text-orange-900 rounded p-3 mb-3 no-print text-sm">
          🟧 <strong>変更があります。</strong>「🖨 帳票プレビュー」で<strong>変更見積書</strong>（変更前→変更後）が出せます。元の確定見積にもどすには「確定をもどす」ではなく、変更箇所を元の値に戻してください。
        </div>
      )}
      {/* マスタスナップショット情報 */}
      <div className="bg-blue-50 border border-blue-200 rounded p-3 mb-3 no-print flex items-center justify-between flex-wrap gap-2 text-sm">
        <div className="flex items-center gap-2">
          <span>📦</span>
          <span className="text-slate-700">
            この見積は {project.snapshotAt ? <strong>{fmtDate(project.snapshotAt)}</strong> : <span className="text-amber-700">(未取り込み)</span>} 時点の単価マスタを使用中
          </span>
          <span className="text-xs text-slate-500">({(project.rateMasterSnapshot || masters.rateMaster).length} 項目)</span>
        </div>
        <button onClick={onRefreshSnapshot}
          className="text-xs px-3 py-1 border border-blue-400 bg-white text-blue-700 rounded hover:bg-blue-100">
          🔄 マスタを最新に更新
        </button>
      </div>
      <div className="bg-white border border-slate-200 rounded-t-lg p-4 no-print">
        <div className="space-y-3">
          {/* 物件名（読み取り専用表示） */}
          <div>
            <label className="text-xs text-slate-600 font-semibold">🏠 物件名</label>
            <div className="text-xl sm:text-2xl font-bold text-slate-900 bg-slate-50 border border-slate-200 rounded px-3 py-2 w-full">
              {project.propertyName || <span className="text-slate-400 text-base font-normal">(物件名なし)</span>}
              <span className="text-xs text-slate-400 font-normal ml-2">※変更は物件一覧から</span>
            </div>
          </div>
          {/* 見積名 */}
          <div>
            <label className="text-xs text-slate-600 font-semibold">📄 見積名</label>
            <input type="text" value={project.name}
              onChange={e => onChange(p => ({ ...p, name: e.target.value }))}
              className="text-base font-semibold bg-slate-50 hover:bg-white focus:bg-white border border-slate-300 focus:border-blue-500 focus:outline-none rounded px-3 py-1.5 w-full" />
          </div>
        </div>
        <div className="flex flex-wrap gap-3 mt-3 text-sm">
          <label className="flex items-center gap-2 flex-1 min-w-fit">
            <span className="text-slate-600 whitespace-nowrap">施主名</span>
            <input type="text" value={project.clientName || ''} onChange={e => onChange(p => ({ ...p, clientName: e.target.value }))}
              className="border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-2 py-1 flex-1 min-w-0" placeholder="例: 山田太郎(敬称不要)" />
          </label>
          <label className="flex items-center gap-2 flex-1 min-w-fit">
            <span className="text-slate-600 whitespace-nowrap">現場</span>
            <input type="text" value={project.siteAddress || ''} onChange={e => onChange(p => ({ ...p, siteAddress: e.target.value }))}
              className="border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-2 py-1 flex-1 min-w-0" placeholder="東京都..." />
          </label>
          <label className="flex items-center gap-2">
            <span className="text-slate-600 whitespace-nowrap">担当</span>
            <input type="text" value={project.staffName || ''} onChange={e => onChange(p => ({ ...p, staffName: e.target.value }))}
              className="border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-2 py-1 w-32" />
          </label>
        </div>
      </div>
      <div className="bg-white border-x border-slate-200 px-2 sm:px-4 no-print overflow-x-auto">
        <div className="flex gap-1">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-3 sm:px-4 py-3 text-sm whitespace-nowrap ${
                tab === t.id ? 'font-semibold text-slate-900 border-b-2 border-slate-900' : 'text-slate-500 hover:text-slate-700'
              }`}>{t.label}</button>
          ))}
        </div>
      </div>
      <div className={`bg-slate-50 border border-slate-200 rounded-b-lg ${tab === 'print' ? 'p-0' : 'p-3 sm:p-6'}`}>
        {tab === 'scale' && <TabScale project={project} onChange={onChange} result={result} />}
        {tab === 'details' && <TabDetails project={project} onChange={onChange} result={result} />}
        {tab === 'result' && <TabResult project={project} result={result} companyInfo={companyInfo} onChange={onChange} />}
        {tab === 'print' && <PrintPreview project={project} result={result} companyInfo={companyInfo} onChange={onChange} onGoSettings={onGoSettings} />}
      </div>
    </div>
  );
}

function TabScale({ project, onChange, result }) {
  const sp = result.scale;
  const setScale = (key, val) => onChange(p => ({ ...p, scale: { ...p.scale, [key]: val } }));
  const opts = project.options || [];
  const setOptions = (newOpts) => onChange(p => ({ ...p, options: newOpts }));

  // 階数を変更したとき、軒高のデフォルトも更新
  const setFloorCount = (val) => {
    const newFloor = parseInt(val);
    const defaultEaves = { 1: 3.5, 2: 6.5, 3: 9.5 }[newFloor] || 6.5;
    onChange(p => ({ ...p, scale: { ...p.scale, floorCount: newFloor, eavesHeight: defaultEaves } }));
  };

  const [advancedOpen, setAdvancedOpen] = useState(false);
  const floorCount = parseInt(project.scale.floorCount) || 2;
  const defaultFloorArea = (sp.totalFloorArea / floorCount).toFixed(2);
  const locked = project.status === 'finalized';   // 確定後は規模を固定（各項目の変更は内訳明細で）

  return (
    <div>
      {locked && (
        <div className="bg-blue-50 border border-blue-300 text-blue-900 rounded p-3 mb-3 text-sm">
          🔒 <strong>確定済みのため「規模」は変更できません。</strong>各項目の数量・単価の変更は「2. 内訳明細」で行ってください。規模そのものを直したいときは、上部の「確定をもどす」で作成中に戻してください。
        </div>
      )}
      <div className={`grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 ${locked ? 'opacity-60 pointer-events-none select-none' : ''}`}>
        <div className="bg-white border border-slate-200 rounded-lg p-4 sm:p-5">
          <h4 className="text-sm font-bold text-slate-900 mb-4">📝 入力欄</h4>
          <div className="space-y-4">
            <Field label="延床坪数" value={project.scale.tsuboFloor} unit="坪"
              conversion={`= ${(parseFloat(project.scale.tsuboFloor || 0) * 3.3058).toFixed(2)} ㎡`}
              onChange={v => setScale('tsuboFloor', v)} />
            <SelectField label="階数" value={project.scale.floorCount}
              options={[{v:1,l:'1階(平屋)'},{v:2,l:'2階'},{v:3,l:'3階'}]}
              onChange={v => setFloorCount(v)}
              help="変更すると軒高のデフォルト値も更新されます" />

            <Field label="建築面積" value={project.scale.buildingAreaInput} unit="㎡" step="0.1"
              conversion={project.scale.buildingAreaInput ? `= ${(parseFloat(project.scale.buildingAreaInput) / 3.3058).toFixed(2)} 坪` : ''}
              onChange={v => setScale('buildingAreaInput', v)}
              help={`1階の床面積(建物を真上から見た面積)。基礎・屋根の計算に使用。\n空欄なら自動(現在: ${sp.buildingArea.toFixed(2)}㎡)`} />

            {/* 1階・2階面積を主要入力欄に (平屋では不要) */}
            {floorCount >= 2 && (
              <div className="bg-slate-50 border border-slate-200 rounded p-3 space-y-2">
                <div className="text-xs font-bold text-slate-700">階別面積（任意・詳細入力）</div>
                <Field label="1階面積" value={project.scale.floor1Area} unit="㎡" step="0.1"
                  conversion={project.scale.floor1Area ? `= ${(parseFloat(project.scale.floor1Area) / 3.3058).toFixed(2)} 坪` : ''}
                  onChange={v => setScale('floor1Area', v)} help={`空欄なら自動(${defaultFloorArea}㎡)`} />
                <Field label="2階面積" value={project.scale.floor2Area} unit="㎡" step="0.1"
                  conversion={project.scale.floor2Area ? `= ${(parseFloat(project.scale.floor2Area) / 3.3058).toFixed(2)} 坪` : ''}
                  onChange={v => setScale('floor2Area', v)} help={`空欄なら自動(${defaultFloorArea}㎡)`} />
                {floorCount >= 3 && (
                  <Field label="3階面積" value={project.scale.floor3Area} unit="㎡" step="0.1"
                    conversion={project.scale.floor3Area ? `= ${(parseFloat(project.scale.floor3Area) / 3.3058).toFixed(2)} 坪` : ''}
                    onChange={v => setScale('floor3Area', v)} help={`空欄なら自動(${defaultFloorArea}㎡)`} />
                )}
              </div>
            )}

            <Field label="軒高" value={project.scale.eavesHeight} unit="m" step="0.1"
              onChange={v => setScale('eavesHeight', v)}
              help={`平屋3.5m / 2階6.5m / 3階9.5m が目安。最高高さではなく軒高です。`} />
            <SelectField label="屋根形状" value={project.scale.roofShape}
              options={[{v:'切妻',l:'切妻 (1.32)'},{v:'寄棟',l:'寄棟 (1.40)'},{v:'片流れ',l:'片流れ (1.20)'},{v:'陸屋根',l:'陸屋根 (1.05)'}]}
              onChange={v => setScale('roofShape', v)} help="数字は屋根面積係数(建築面積×係数)" />
            <SelectField label="建物の形" value={project.scale.buildingShape || '長方形'}
              options={[
                {v:'正方形',l:'正方形 (シンプル、係数1.00)'},
                {v:'長方形',l:'長方形 (一般的、係数0.89)'},
                {v:'L字型',l:'L字型 (やや複雑、係数0.82)'},
                {v:'コの字型',l:'コの字型 (複雑、係数0.76)'}
              ]}
              onChange={v => setScale('buildingShape', v)}
              help="複雑な形ほど、外周長が増えて足場・外壁が高くなります" />
          </div>
        </div>
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 sm:p-5">
          <h4 className="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2">
            <span>🔄 自動算出</span>
            <span className="text-xs text-blue-600">リアルタイム</span>
          </h4>
          <div className="space-y-2 text-sm">
            <Row label="建築面積" value={`${sp.buildingArea.toFixed(2)} ㎡`} bold highlight={sp.buildingAreaManual} />
            <Row label="外周長" value={`${sp.perimeter.toFixed(2)} m`} bold highlight={sp.perimeterManual} />
            <Row label="外壁高さ" value={`${sp.wallHeight.toFixed(1)} m`} bold help="軒高+2.0m" />
            <div className="border-t border-blue-300 my-3"></div>
            <div className="text-xs text-slate-500 mb-2">📐 派生値（参考）</div>
            <Row label="延床面積" value={`${sp.totalFloorArea.toFixed(2)} ㎡`} />
            <Row label="外壁面積" value={`${sp.wallArea.toFixed(2)} ㎡`} highlight={sp.wallAreaManual} />
            <Row label="屋根面積" value={`${sp.roofArea.toFixed(2)} ㎡`} highlight={sp.roofAreaManual} />
            <Row label="内装床面積" value={`${sp.innerFloorArea.toFixed(2)} ㎡`} />
          </div>
        </div>
      </div>

      {/* 詳細寸法（派生値の手動上書きのみ） */}
      <div className="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
        <button onClick={() => setAdvancedOpen(o => !o)}
          className="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 text-left">
          <span className="font-bold text-sm">
            {advancedOpen ? '▼' : '▶'} 派生値を直接上書き（実測値で精度UP）
          </span>
          <span className="text-xs text-slate-500">空欄なら自動計算</span>
        </button>
        {advancedOpen && (
          <div className="p-4 border-t border-slate-200 bg-slate-50">
            <p className="text-xs text-slate-600 mb-3">図面から実測した値を入れると、自動計算より高い精度になります。手動値が入った項目は <span className="bg-amber-100 px-1 rounded font-bold">マーカー表示</span> されます。</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              <Field label="外周長" value={project.scale.manualPerimeter} unit="m" step="0.1"
                onChange={v => setScale('manualPerimeter', v)} help={`空欄なら自動(${sp.autoPerimeter.toFixed(2)}m)`} />
              <Field label="外壁面積" value={project.scale.manualWallArea} unit="㎡" step="0.1"
                onChange={v => setScale('manualWallArea', v)} help={`空欄なら自動(${sp.autoWallArea.toFixed(2)}㎡)`} />
              <Field label="屋根面積" value={project.scale.manualRoofArea} unit="㎡" step="0.1"
                onChange={v => setScale('manualRoofArea', v)} help={`空欄なら自動(${sp.autoRoofArea.toFixed(2)}㎡)`} />
            </div>
          </div>
        )}
      </div>

      <div className="mt-4 bg-amber-50 border-l-4 border-amber-400 p-3 text-xs text-amber-900 rounded">
        💡 軒高が一定でない場合（部分的に高さが違う等）は、平均的な値を入れてください。大きく違う場合は内訳明細タブで該当項目（足場・外壁・断熱壁）の数量を直接編集できます。
      </div>
    </div>
  );
}

function OptionPresets({ options, setOptions }) {
  const presets = [
    { name: '太陽光発電 4kW', amount: 1200000 },
    { name: '太陽光発電 6kW以上', amount: 1800000 },
    { name: '解体工事 木造30坪', amount: 1200000 },
    { name: '追加外構（10%枠目安）', amount: 280000 }
  ];
  const addPreset = (p) => setOptions([...options, { id: uuid(), name: p.name, amount: p.amount }]);
  return (
    <div className="flex flex-wrap gap-1.5">
      {presets.map(p => (
        <button key={p.name} onClick={() => addPreset(p)}
          className="text-xs px-2 py-1 bg-white border border-orange-300 text-orange-700 rounded hover:bg-orange-50">
          ＋ {p.name} ({(p.amount/10000).toFixed(0)}万)
        </button>
      ))}
    </div>
  );
}

function Field({ label, value, unit, step, onChange, help, conversion }) {
  return (
    <div>
      <label className="text-xs text-slate-600 font-semibold">{label}</label>
      <div className="flex items-center gap-2 mt-1">
        <input type="number" value={value} step={step || 1} onChange={e => onChange(e.target.value)}
          className="border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-3 py-2 w-28 text-right num font-mono" />
        {unit && <span className="text-sm text-slate-600">{unit}</span>}
        {conversion && <span className="text-xs text-slate-500 num">({conversion})</span>}
      </div>
      {help && <div className="text-xs text-slate-400 mt-1 whitespace-pre-line">{help}</div>}
    </div>
  );
}

function SelectField({ label, value, options, onChange, help }) {
  return (
    <div>
      <label className="text-xs text-slate-600 font-semibold">{label}</label>
      <select value={value} onChange={e => onChange(e.target.value)}
        className="block mt-1 border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-3 py-2 w-full">
        {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
      {help && <div className="text-xs text-slate-400 mt-1">{help}</div>}
    </div>
  );
}

function Row({ label, value, bold, highlight, help }) {
  return (
    <div className="flex justify-between items-center">
      <span className="text-slate-600 flex items-center gap-1">
        {label}
        {help && <span className="text-xs text-slate-400" title={help}>ⓘ</span>}
      </span>
      <span className={`num font-mono ${bold ? 'font-semibold text-slate-900' : ''} ${highlight ? 'bg-amber-100 px-2 py-0.5 rounded font-bold' : ''}`}>{value}</span>
    </div>
  );
}

function TabDetails({ project, onChange, result }) {
  const [filter, setFilter] = useState({ category: 'all', group: 'all' });
  const [collapsed, setCollapsed] = useState({});
  const [editingNos, setEditingNos] = useState(() => new Set());  // 変更モードで「変更」を押して編集中の項目No

  // 変更モード＝確定後。確定時点（baseSnapshot）と比べて、変更前/変更後を見せる。
  const changeMode = project.status === 'finalized' && !!project.baseSnapshot;
  const baseMap = useMemo(() => {
    const m = new Map();
    (project.baseSnapshot?.lines || []).forEach(b => m.set(b.no, b));
    return m;
  }, [project.baseSnapshot]);
  // 変更前と比べて中身が変わっているか
  const lineChanged = (l, base) => {
    if (!base) return false;
    return (l.name !== base.name) || (l.spec !== base.spec)
      || (Number(l.quantity || 0) !== Number(base.quantity || 0))
      || (Number(lineUnitPrice(l)) !== Number(lineUnitPrice(base)));
  };

  const filtered = result.lines.filter(l => {
    if (l.masterDisabled) return false;  // マスタで無効化された項目は表示しない
    if (filter.category !== 'all' && l.category !== filter.category) return false;
    if (filter.group !== 'all' && l.categoryGroup !== filter.group) return false;
    return true;
  });

  // カテゴリ別グループ化（A, B, C, ... の項目記号ごと）
  // 注: 全項目がmasterDisabledのカテゴリは表示されない
  // 区分(本体/付帯/諸経費)ごとに並べ、新規追加カテゴリは該当区分の末尾に配置
  const groups = useMemo(() => {
    const g = {};
    filtered.forEach(l => {
      const key = l.categoryGroup;
      if (!g[key]) g[key] = { categoryGroup: key, categoryName: l.categoryName, category: l.category, lines: [], total: 0 };
      g[key].lines.push(l);
      g[key].total += l.amount;
    });
    return sortGroupsBySection(Object.values(g));
  }, [filtered]);

  const toggleItem = (no) => {
    onChange(p => {
      const ex = p.excludedItems || [];
      const newEx = ex.includes(no) ? ex.filter(x => x !== no) : [...ex, no];
      return { ...p, excludedItems: newEx };
    });
  };
  const editPrice = (no, val) => {
    onChange(p => {
      const mp = { ...(p.manualPrices || {}) };
      // 空文字もそのまま保持（クリアして打ち直せるように）。計算側は空＝標準単価として扱う。
      mp[no] = val;
      return { ...p, manualPrices: mp };
    });
  };
  const resetManual = (no) => {
    onChange(p => {
      const mp = { ...(p.manualPrices || {}) }; delete mp[no];
      return { ...p, manualPrices: mp };
    });
  };
  const editQuantity = (no, val) => {
    onChange(p => {
      const mq = { ...(p.manualQuantities || {}) };
      // 空文字もそのまま保持（クリアして打ち直せるように）。計算側は空＝自動値として扱う。
      mq[no] = val;
      return { ...p, manualQuantities: mq };
    });
  };
  const resetQuantity = (no) => {
    onChange(p => {
      const mq = { ...(p.manualQuantities || {}) }; delete mq[no];
      return { ...p, manualQuantities: mq };
    });
  };
  // 変更モード：この項目の変更をすべて取り消し、変更前（確定時）の状態に戻す
  const resetLineToBase = (no) => {
    onChange(p => {
      const mp = { ...(p.manualPrices || {}) }; delete mp[no];
      const mq = { ...(p.manualQuantities || {}) }; delete mq[no];
      const ex = (p.excludedItems || []).filter(x => x !== no);   // 削除も取り消す
      const base = (p.baseSnapshot?.lines || []).find(b => b.no === no);
      let snap = p.rateMasterSnapshot;
      if (base && snap) snap = snap.map(it => it.no === no ? { ...it, name: base.name, spec: base.spec } : it);
      return { ...p, manualPrices: mp, manualQuantities: mq, excludedItems: ex, rateMasterSnapshot: snap };
    });
    setEditingNos(s => { const n = new Set(s); n.delete(no); return n; });
  };
  const startEditLine = (no) => setEditingNos(s => new Set(s).add(no));
  const stopEditLine = (no) => setEditingNos(s => { const n = new Set(s); n.delete(no); return n; });
  // この見積限定で、内訳名・規格を編集 (スナップショットを書き換え)
  const editSnapshotField = (no, key, val) => {
    onChange(p => {
      const snapshot = p.rateMasterSnapshot || [];
      const newSnapshot = snapshot.map(item =>
        item.no === no ? { ...item, [key]: val } : item
      );
      return { ...p, rateMasterSnapshot: newSnapshot };
    });
  };
  const addCustom = (categoryGroup) => {
    const groupInfo = result.lines.find(l => l.categoryGroup === categoryGroup);
    // 同カテゴリ内の最大番号を探して+1
    const existing = result.lines.filter(l => l.categoryGroup === categoryGroup);
    let maxNum = 0;
    existing.forEach(l => {
      const m = String(l.no).match(/-(\d+)$/);
      if (m) {
        const n = parseInt(m[1], 10);
        if (n > maxNum) maxNum = n;
      }
    });
    const newNo = `${categoryGroup}-${maxNum + 1}`;
    const c = {
      id: uuid(), no: newNo,
      name: '', spec: '', quantity: 1, unit: '式', price: '',
      category: groupInfo?.category || '本体工事',
      categoryGroup: categoryGroup || 'M',
      categoryName: groupInfo?.categoryName || 'カスタム',
      enabled: true
    };
    onChange(p => ({ ...p, customItems: [...(p.customItems || []), c] }));
  };

  // この見積限定で、新しいカテゴリーを追加 (customItems経由・他見積には影響しない) — モーダルで入力
  const [addCatModalOpen, setAddCatModalOpen] = useState(false);
  const addCustomCategoryNextCode = useMemo(() => {
    const used = new Set();
    result.lines.forEach(l => used.add(l.categoryGroup));
    return nextAvailableCategoryCode([...used]);
  }, [result.lines]);
  const addCustomCategoryExistingNames = useMemo(
    () => [...new Set(result.lines.map(l => l.categoryName))],
    [result.lines]
  );
  const handleAddCustomCategoryConfirm = (trimmed, category) => {
    if (!trimmed) return;
    const used = new Set();
    result.lines.forEach(l => used.add(l.categoryGroup));
    const code = nextAvailableCategoryCode([...used]);
    const c = {
      id: uuid(),
      no: `${code}-1`,
      name: '新規項目',
      spec: '',
      quantity: 1,
      unit: '式',
      price: 0,
      category,
      categoryGroup: code,
      categoryName: trimmed,
      enabled: true
    };
    onChange(p => ({ ...p, customItems: [...(p.customItems || []), c] }));
    // この見積のフィルタが絞り込み中の場合、新カテゴリが見えなくなるのを防ぐためにリセット
    setFilter({ category: 'all', group: 'all' });
    setAddCatModalOpen(false);
  };
  const updateCustom = (id, key, val) => {
    onChange(p => ({ ...p, customItems: (p.customItems || []).map(c => c.id === id ? { ...c, [key]: val } : c) }));
  };
  const deleteCustom = (id) => {
    onChange(p => ({ ...p, customItems: (p.customItems || []).filter(c => c.id !== id) }));
  };
  const toggleCollapse = (g) => setCollapsed(c => ({ ...c, [g]: !c[g] }));

  // フィルタ用の項目コード一覧を現データから動的に作成 (ユーザー追加カテゴリも含む)
  const groupCodes = useMemo(() => {
    const set = new Set();
    result.lines.forEach(l => {
      if (l.masterDisabled) return; // マスタで無効化されているものは選択肢に出さない
      set.add(l.categoryGroup);
    });
    return [...set].sort(compareCategoryCode);
  }, [result.lines]);

  // 共通のセルスタイル
  const editableCell = "border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-1.5 py-0.5";
  const editableCellNum = editableCell + " text-right num font-mono";

  // ======================= 変更モードの内訳明細 =======================
  if (changeMode) {
    const ds = diffSummary(project, result);
    const catColorOf = (cat) => cat === '本体工事' ? 'bg-blue-100 text-blue-900 border-blue-300' :
                                cat === '付帯工事' ? 'bg-amber-100 text-amber-900 border-amber-300' :
                                'bg-green-100 text-green-900 border-green-300';
    // 値の入出力（マスタ項目／カスタム項目の両対応）
    const setName = (l, v) => l.isCustom ? updateCustom(l.customId, 'name', v) : editSnapshotField(l.no, 'name', v);
    const setSpec = (l, v) => l.isCustom ? updateCustom(l.customId, 'spec', v) : editSnapshotField(l.no, 'spec', v);
    const setQty = (l, v) => l.isCustom ? updateCustom(l.customId, 'quantity', v) : editQuantity(l.no, v);
    const setPrc = (l, v) => l.isCustom ? updateCustom(l.customId, 'price', v) : editPrice(l.no, v);
    const qtyVal = (l) => l.isCustom ? l.quantity : ((project.manualQuantities || {})[l.no] !== undefined ? project.manualQuantities[l.no] : (typeof l.quantity === 'number' ? l.quantity.toFixed(2) : l.quantity));
    const prcVal = (l) => l.isCustom ? l.effectivePrice : ((project.manualPrices || {})[l.no] !== undefined ? project.manualPrices[l.no] : l.effectivePrice);

    const renderChangeLine = (l) => {
      const no = l.no;
      const base = baseMap.get(no);
      const isCustom = l.isCustom;
      const excluded = !l.enabled;

      // 削除（取り消し線）
      if (excluded) {
        const src = base || l;
        return (
          <tr key={isCustom ? l.customId : no} className="bg-red-50 text-red-700 line-through border-b border-red-200">
            <td className="px-2 py-1 font-mono">{l.displayNo || no}</td>
            <td className="px-2 py-1">{src.name}</td>
            <td className="px-2 py-1 text-[11px] no-underline text-red-500">{src.spec}</td>
            <td className="px-2 py-1 text-right num">{fmtQty(src.quantity)}</td>
            <td className="px-2 py-1">{src.unit}</td>
            <td className="px-2 py-1 text-right num">{fmt(lineUnitPrice(src))}</td>
            <td className="px-2 py-1 text-right num">{fmt(base ? base.amount : 0)}</td>
            <td className="px-2 py-1 text-center no-underline whitespace-nowrap">
              <span className="inline-block bg-red-100 text-red-700 font-bold rounded px-1.5 mr-1">削除</span>
              <button onClick={() => isCustom ? updateCustom(l.customId, 'enabled', true) : toggleItem(no)}
                className="text-blue-600 underline hover:bg-blue-50 rounded px-1 text-[11px]">取消</button>
            </td>
          </tr>
        );
      }

      // 追加（変更前になかった新項目）
      if (!base) {
        return (
          <tr key={isCustom ? l.customId : no} className="bg-green-50 text-green-900 border-b border-green-200">
            <td className="px-2 py-1 font-mono">＋ {l.displayNo || no}</td>
            <td className="px-2 py-1"><input type="text" value={l.name || ''} onChange={e => setName(l, e.target.value)} placeholder="項目名" className={editableCell + " w-full bg-white"} /></td>
            <td className="px-2 py-1"><input type="text" value={l.spec || ''} onChange={e => setSpec(l, e.target.value)} placeholder="規格・仕様" className={editableCell + " w-full bg-white text-slate-500"} /></td>
            <td className="px-2 py-1 text-right"><input type="number" value={qtyVal(l)} onChange={e => setQty(l, e.target.value)} placeholder="数量" className={editableCellNum + " w-16 bg-white"} /></td>
            <td className="px-2 py-1"><input type="text" value={l.unit || ''} readOnly={!isCustom} onChange={e => isCustom && updateCustom(l.customId, 'unit', e.target.value)} placeholder="単位" title="単位（式・㎡・台・ヶ所など）" className={editableCell + " w-12 bg-white"} /></td>
            <td className="px-2 py-1 text-right"><input type="number" value={prcVal(l)} onChange={e => setPrc(l, e.target.value)} placeholder="単価(円)" title="単価（円）" className={editableCellNum + " w-20 bg-white"} /></td>
            <td className="px-2 py-1 text-right num font-semibold">{fmt(l.amount)}</td>
            <td className="px-2 py-1 text-center whitespace-nowrap">
              <span className="inline-block bg-green-100 text-green-700 font-bold rounded px-1.5 mr-1">追加</span>
              <button onClick={() => isCustom ? deleteCustom(l.customId) : toggleItem(no)} className="text-red-600 underline hover:bg-red-50 rounded px-1 text-[11px]">取消</button>
            </td>
          </tr>
        );
      }

      const changed = lineChanged(l, base);
      const editing = changed || editingNos.has(no);

      // 据置（読み取り）＋【変更】【削除】
      if (!editing) {
        return (
          <tr key={no} className="border-b border-slate-100 text-slate-700">
            <td className="px-2 py-1 font-mono">{l.displayNo || no}</td>
            <td className="px-2 py-1">{l.name}</td>
            <td className="px-2 py-1 text-[11px] text-slate-400">{l.spec}</td>
            <td className="px-2 py-1 text-right num">{fmtQty(l.quantity)}</td>
            <td className="px-2 py-1">{l.unit}</td>
            <td className="px-2 py-1 text-right num">{fmt(lineUnitPrice(l))}</td>
            <td className="px-2 py-1 text-right num">{fmt(l.amount)}</td>
            <td className="px-2 py-1 text-center whitespace-nowrap">
              <button onClick={() => startEditLine(no)} className="text-orange-700 border border-orange-300 bg-orange-50 rounded px-2 py-0.5 mr-1 hover:bg-orange-100">変更</button>
              <button onClick={() => toggleItem(no)} className="text-red-600 border border-red-300 bg-red-50 rounded px-2 py-0.5 hover:bg-red-100">削除</button>
            </td>
          </tr>
        );
      }

      // 変更（上＝変更前 斜線／下＝変更後 入力）
      return (
        <React.Fragment key={no}>
          <tr className="bg-slate-50 text-slate-500 line-through">
            <td className="px-2 py-1 font-mono">{l.displayNo || no}</td>
            <td className="px-2 py-1">{base.name}</td>
            <td className="px-2 py-1 text-[11px] no-underline text-slate-400">{base.spec}</td>
            <td className="px-2 py-1 text-right num">{fmtQty(base.quantity)}</td>
            <td className="px-2 py-1">{base.unit}</td>
            <td className="px-2 py-1 text-right num">{fmt(lineUnitPrice(base))}</td>
            <td className="px-2 py-1 text-right num">{fmt(base.amount)}</td>
            <td rowSpan={2} className="px-2 py-1 text-center no-underline align-middle border-l border-orange-200 whitespace-nowrap">
              <div className="bg-orange-100 text-orange-700 font-bold rounded px-1.5 mb-1">変更</div>
              <button onClick={() => resetLineToBase(no)} className="text-blue-600 underline hover:bg-blue-50 rounded px-1 text-[11px]">変更を取消</button>
            </td>
          </tr>
          <tr className="bg-orange-50 text-orange-900 border-b-2 border-orange-200 font-semibold">
            <td className="px-2 py-1 font-mono">↳</td>
            <td className="px-2 py-1"><input type="text" value={l.name || ''} onChange={e => setName(l, e.target.value)} className={editableCell + " w-full bg-white font-normal"} /></td>
            <td className="px-2 py-1"><input type="text" value={l.spec || ''} onChange={e => setSpec(l, e.target.value)} className={editableCell + " w-full bg-white text-slate-500 font-normal"} /></td>
            <td className="px-2 py-1 text-right"><input type="number" step="0.01" value={qtyVal(l)} onChange={e => setQty(l, e.target.value)} className={editableCellNum + " w-16 bg-white font-normal"} /></td>
            <td className="px-2 py-1">{l.unit}</td>
            <td className="px-2 py-1 text-right"><input type="number" value={prcVal(l)} onChange={e => setPrc(l, e.target.value)} className={editableCellNum + " w-20 bg-white font-normal"} /></td>
            <td className="px-2 py-1 text-right num">{fmt(l.amount)}
              <div className="text-[10px] font-normal">({(() => { const d = (l.amount || 0) - (base.amount || 0); return (d >= 0 ? '+' : '−') + fmt(Math.abs(d)); })()})</div>
            </td>
          </tr>
        </React.Fragment>
      );
    };

    return (
      <div>
        <div className="bg-orange-50 border border-orange-300 rounded p-3 mb-3 text-sm text-orange-900">
          🟧 <strong>変更モードの内訳明細です。</strong>各項目の【変更】で変更後を入力、【削除】で取り消し線、各カテゴリ右上の【＋ 新規追加】で項目追加。ここでの操作はそのまま<strong>変更見積書</strong>に反映されます。
          <span className="ml-2 text-xs">（変更 {ds.counts.modified}・追加 {ds.counts.added}・削除 {ds.counts.deleted} 項目）</span>
        </div>
        {/* フィルタ（簡易） */}
        <div className="bg-white rounded-lg p-3 mb-3 flex gap-2 items-center text-sm flex-wrap border border-slate-200">
          <span className="text-slate-600 text-xs">カテゴリ:</span>
          <select value={filter.category} onChange={e => setFilter(f => ({ ...f, category: e.target.value }))} className="border border-slate-300 rounded px-2 py-1 text-xs bg-slate-50">
            <option value="all">すべて</option><option value="本体工事">本体工事</option><option value="付帯工事">付帯工事</option><option value="諸経費">諸経費</option>
          </select>
          <span className="text-slate-600 text-xs ml-2">項目:</span>
          <select value={filter.group} onChange={e => setFilter(f => ({ ...f, group: e.target.value }))} className="border border-slate-300 rounded px-2 py-1 text-xs bg-slate-50">
            <option value="all">すべて</option>
            {groupCodes.map(g => <option key={g} value={g}>{g}</option>)}
          </select>
          <span className="ml-auto text-xs text-slate-500">{filtered.length} 件表示</span>
        </div>

        <div className="space-y-3">
          {groups.map(g => {
            const isCollapsed = collapsed[g.categoryGroup];
            return (
              <div key={g.categoryGroup} className="bg-white border border-slate-200 rounded-lg overflow-hidden">
                <div className={`${catColorOf(g.category)} px-3 py-2 border-b flex items-center justify-between`}>
                  <div className="flex items-center gap-2">
                    <button onClick={() => toggleCollapse(g.categoryGroup)} className="text-xs hover:bg-white/30 rounded px-1">{isCollapsed ? '▶' : '▼'}</button>
                    <span className="font-mono font-bold text-sm">{g.categoryGroup}.</span>
                    <span className="font-bold text-sm">{g.categoryName}</span>
                    <span className="text-xs ml-2">({g.lines.length}件)</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <button onClick={() => addCustom(g.categoryGroup)} className="text-xs px-2 py-0.5 border border-current rounded hover:bg-white/30">＋ 新規追加</button>
                    <span className="num font-mono font-bold text-sm">{fmt(g.total)} 円</span>
                  </div>
                </div>
                {!isCollapsed && (
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs border-collapse">
                      <thead className="bg-slate-100 text-slate-600">
                        <tr>
                          <th className="px-2 py-1.5 text-left w-12">No.</th>
                          <th className="px-2 py-1.5 text-left">内訳名</th>
                          <th className="px-2 py-1.5 text-left">規格・仕様</th>
                          <th className="px-2 py-1.5 text-right w-20">数量</th>
                          <th className="px-2 py-1.5 text-left w-12">単位</th>
                          <th className="px-2 py-1.5 text-right w-24">単価</th>
                          <th className="px-2 py-1.5 text-right w-28">金額</th>
                          <th className="px-2 py-1.5 text-center w-28">区分・操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        {g.lines.map(l => renderChangeLine(l))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );
