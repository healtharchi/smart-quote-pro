          })}
        </div>

        <div className="mt-3 bg-amber-50 rounded p-2 border border-amber-200 text-xs text-slate-600">
          💡 <strong>使い方</strong>：そのままの項目は薄く表示。【変更】を押すと下に「変更後」の入力欄が出ます（上＝変更前は斜線）。【削除】で取り消し線、【＋ 新規追加】で項目追加。すべて「🖨 帳票プレビュー → 変更見積書」にそのまま反映されます。元に戻したいときは各行の【変更を取消】【取消】。
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* フィルタ */}
      <div className="bg-white rounded-lg p-3 mb-3 flex gap-2 items-center text-sm flex-wrap border border-slate-200">
        <span className="text-slate-600 text-xs">カテゴリ:</span>
        <select value={filter.category} onChange={e => setFilter(f => ({...f, category: e.target.value}))}
          className="border border-slate-300 rounded px-2 py-1 text-xs bg-slate-50">
          <option value="all">すべて</option>
          <option value="本体工事">本体工事</option>
          <option value="付帯工事">付帯工事</option>
          <option value="諸経費">諸経費</option>
        </select>
        <span className="text-slate-600 text-xs ml-2">項目:</span>
        <select value={filter.group} onChange={e => setFilter(f => ({...f, group: e.target.value}))}
          className="border border-slate-300 rounded px-2 py-1 text-xs bg-slate-50">
          <option value="all">すべて</option>
          {groupCodes.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
        <button onClick={() => setAddCatModalOpen(true)}
          className="ml-2 text-xs px-2 py-1 border border-pink-400 text-pink-700 bg-pink-50 rounded hover:bg-pink-100 font-bold"
          title="この見積限定のカテゴリーを追加(英字コードは自動採番)">＋ 新規カテゴリ追加</button>
        <span className="ml-auto text-xs text-slate-500">{filtered.length} 件表示</span>
      </div>
      <CategoryAddModal open={addCatModalOpen}
        title="新規カテゴリー追加"
        scope="この見積限定（他の見積には影響しません）"
        existingNames={addCustomCategoryExistingNames}
        nextCode={addCustomCategoryNextCode}
        onCancel={() => setAddCatModalOpen(false)}
        onConfirm={handleAddCustomCategoryConfirm} />

      {/* カテゴリ別グループ */}
      <div className="space-y-3">
        {groups.map(g => {
          const isCollapsed = collapsed[g.categoryGroup];
          const catColor = g.category === '本体工事' ? 'bg-blue-100 text-blue-900 border-blue-300' :
                           g.category === '付帯工事' ? 'bg-amber-100 text-amber-900 border-amber-300' :
                           'bg-green-100 text-green-900 border-green-300';
          return (
            <div key={g.categoryGroup} className="bg-white border border-slate-200 rounded-lg overflow-hidden">
              {/* グループヘッダー */}
              <div className={`${catColor} px-3 py-2 border-b flex items-center justify-between`}>
                <div className="flex items-center gap-2">
                  <button onClick={() => toggleCollapse(g.categoryGroup)} className="text-xs hover:bg-white/30 rounded px-1">
                    {isCollapsed ? '▶' : '▼'}
                  </button>
                  <span className="font-mono font-bold text-sm">{g.categoryGroup}.</span>
                  <span className="font-bold text-sm">{g.categoryName}</span>
                  <span className="text-xs ml-2">({g.lines.length}件)</span>
                </div>
                <div className="flex items-center gap-3">
                  <button onClick={() => addCustom(g.categoryGroup)}
                    className="text-xs px-2 py-0.5 border border-current rounded hover:bg-white/30">＋追加</button>
                  <span className="num font-mono font-bold text-sm">{fmt(g.total)} 円</span>
                </div>
              </div>

              {/* テーブル */}
              {!isCollapsed && (
                <div className="overflow-x-auto">
                  <table className="w-full text-xs" style={{tableLayout: 'fixed'}}>
                    <colgroup>
                      <col style={{width:'32px'}} />
                      <col style={{width:'56px'}} />
                      <col style={{width:'180px'}} />
                      <col />
                      <col style={{width:'80px'}} />
                      <col style={{width:'56px'}} />
                      <col style={{width:'128px'}} />
                      <col style={{width:'112px'}} />
                      <col style={{width:'128px'}} />
                      <col style={{width:'32px'}} />
                    </colgroup>
                    <thead className="bg-slate-100 text-slate-600">
                      <tr>
                        <th className="px-2 py-1.5 text-center">使</th>
                        <th className="px-2 py-1.5 text-left">No.</th>
                        <th className="px-2 py-1.5 text-left">内訳名</th>
                        <th className="px-2 py-1.5 text-left">規格・仕様</th>
                        <th className="px-2 py-1.5 text-right">数量</th>
                        <th className="px-2 py-1.5 text-left">単位</th>
                        <th className="px-2 py-1.5 text-right">単価</th>
                        <th className="px-2 py-1.5 text-right">金額</th>
                        <th className="px-2 py-1.5 text-left">数量式</th>
                        <th className="px-2 py-1.5"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {g.lines.map(l => {
                        const isCustom = l.isCustom;
                        const manualVal = (project.manualPrices || {})[l.no];
                        const priceColor = l.priceSource === 'manual' ? 'text-blue-700 font-bold' :
                                           l.priceSource === 'custom' ? 'text-pink-700' : 'text-slate-900';
                        return (
                          <tr key={isCustom ? l.customId : l.no} className={!l.enabled ? 'opacity-40' : ''}>
                            <td className="px-2 py-1.5 text-center">
                              {isCustom ? (
                                <input type="checkbox" checked={l.enabled} onChange={e => updateCustom(l.customId, 'enabled', e.target.checked)} />
                              ) : (
                                <input type="checkbox" checked={l.enabled} onChange={() => toggleItem(l.no)} />
                              )}
                            </td>
                            <td className="px-2 py-1.5 font-mono">
                              {isCustom ? <span className="text-pink-600">{l.displayNo || l.no}</span> : (l.displayNo || l.no)}
                            </td>
                            <td className="px-2 py-1.5">
                              {isCustom ? (
                                <input type="text" value={l.name || ''}
                                  onChange={e => updateCustom(l.customId, 'name', e.target.value)}
                                  placeholder="内訳名（例：食器棚）"
                                  className={editableCell + " w-full bg-pink-50"} />
                              ) : (
                                <input type="text" value={l.name || ''}
                                  onChange={e => editSnapshotField(l.no, 'name', e.target.value)}
                                  className={editableCell + " w-full"} />
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-slate-500">
                              {isCustom ? (
                                <input type="text" value={l.spec || ''}
                                  onChange={e => updateCustom(l.customId, 'spec', e.target.value)}
                                  className={editableCell + " w-full bg-pink-50"} />
                              ) : (
                                <input type="text" value={l.spec || ''}
                                  onChange={e => editSnapshotField(l.no, 'spec', e.target.value)}
                                  className={editableCell + " w-full"} />
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-right">
                              {isCustom ? (
                                <input type="number" value={l.quantity}
                                  onChange={e => updateCustom(l.customId, 'quantity', e.target.value)}
                                  placeholder="数量"
                                  className={editableCellNum + " w-20 bg-pink-50"} />
                              ) : (
                                <div className="flex items-center gap-1 justify-end">
                                  <input type="number" step="0.01"
                                    value={(project.manualQuantities || {})[l.no] !== undefined ? project.manualQuantities[l.no] : l.autoQuantity.toFixed(2)}
                                    onChange={e => editQuantity(l.no, e.target.value)}
                                    className={editableCellNum + " w-20 " + (l.quantitySource === 'manual' ? 'text-blue-700 font-bold' : '')} />
                                  {l.quantitySource === 'manual' && (
                                    <button onClick={() => resetQuantity(l.no)}
                                      className="text-xs text-blue-600 hover:bg-blue-50 rounded px-1" title="自動値に戻す">↺</button>
                                  )}
                                </div>
                              )}
                            </td>
                            <td className="px-2 py-1.5">
                              {isCustom ? (
                                <input type="text" value={l.unit}
                                  onChange={e => updateCustom(l.customId, 'unit', e.target.value)}
                                  placeholder="単位" title="単位（式・㎡・台・ヶ所など）"
                                  className={editableCell + " w-12 bg-pink-50"} />
                              ) : (
                                <span>{l.unit}</span>
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-right">
                              {isCustom ? (
                                <input type="number" value={l.effectivePrice}
                                  onChange={e => updateCustom(l.customId, 'price', e.target.value)}
                                  placeholder="単価(円)" title="単価（円）"
                                  className={editableCellNum + " w-24 bg-pink-50 text-pink-700"} />
                              ) : (
                                <div className="flex items-center gap-1 justify-end">
                                  <input type="number"
                                    value={manualVal !== undefined ? manualVal : l.effectivePrice}
                                    onChange={e => editPrice(l.no, e.target.value)}
                                    className={editableCellNum + " w-24 " + priceColor} />
                                  {manualVal !== undefined && (
                                    <button onClick={() => resetManual(l.no)}
                                      className="text-xs text-blue-600 hover:bg-blue-50 rounded px-1" title="自動値に戻す">↺</button>
                                  )}
                                </div>
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-right num font-mono font-semibold">{fmt(l.amount)}</td>
                            <td className="px-2 py-1.5 text-xs text-slate-400 truncate max-w-xs" title={l.quantityFormula || ''}>
                              {isCustom ? <span className="text-pink-500">カスタム</span> : l.quantityFormula}
                            </td>
                            <td className="px-2 py-1.5 text-center">
                              {isCustom && (
                                <button onClick={() => deleteCustom(l.customId)}
                                  className="text-red-500 hover:bg-red-50 rounded px-1.5 py-0.5">×</button>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 凡例 */}
      <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-slate-600">
        <div className="bg-white rounded p-2 border border-slate-200">
          <div className="font-bold mb-1">セルの色:</div>
          <div className="space-y-0.5">
            <div>・通常: 自動計算値 / 標準単価</div>
            <div>・<span className="text-blue-700 font-bold">青(太字)</span>: 手動編集された数量・単価（↺で自動値に戻せる）</div>
            <div>・<span className="text-pink-700 font-semibold">ピンク</span>: カスタム追加項目</div>
          </div>
        </div>
        <div className="bg-amber-50 rounded p-2 border border-amber-200">
          💡 灰色の枠が付いているセルは編集可能。数量と単価のどちらも上書きできます。チェックを外すと「使用しない」（金額0）。各カテゴリ右上の「＋追加」でカスタム項目を追加できます（自動で次の連番、例: A-10）。「▶」でカテゴリを折りたためます。<br />
          🆕 画面上部の「＋ 新規カテゴリ追加」で<strong>この見積限定の新カテゴリー</strong>を作れます（英字コードは自動採番。例: 既存が AB までなら AC が振られます）。会社全体に追加したい場合はマスタ管理から追加してください。
        </div>
      </div>
    </div>
  );
}

function TabResult({ project, result, companyInfo, onChange }) {
  const roundingUnit = (project.rounding && project.rounding.unit) || 0;
  // 単位を選んだ「今の金額」で固定の値引き額を計算して保存（以後は固定＝項目の増減がそのまま総額に反映される）
  const applyRounding = (u) => {
    const unit = parseInt(u) || 0;
    const raw = result.rawSubtotal || 0;
    const amount = (unit > 0 && raw > 0) ? (Math.floor(raw / unit) * unit - raw) : 0;
    onChange && onChange(p => ({ ...p, rounding: { unit, amount } }));
  };
  const setRoundingUnit = (u) => applyRounding(u);
  // カテゴリ別合計を集計、本体/付帯/諸経費で分類
  const byGroup = {};
  result.lines.forEach(l => {
    if (!byGroup[l.categoryGroup]) byGroup[l.categoryGroup] = { name: l.categoryName, category: l.category, total: 0 };
    byGroup[l.categoryGroup].total += l.amount;
  });

  // 区分ごとに分類 + 0円カテゴリを除外
  const body = [];
  const side = [];
  const overhead = [];
  Object.entries(byGroup).forEach(([g, info]) => {
    if (info.total <= 0) return; // 0円カテゴリは非表示
    const entry = { ...info, group: g };
    if (info.category === '本体工事') body.push(entry);
    else if (info.category === '付帯工事') side.push(entry);
    else if (info.category === '諸経費') overhead.push(entry);
  });

  const renderSection = (title, items, sectionTotal, colorClass) => {
    if (items.length === 0 && sectionTotal === 0) return null;
    return (
      <div className="mb-4">
        <div className={`text-xs font-bold px-2 py-1 rounded mb-1 ${colorClass}`}>{title}</div>
        <div className="space-y-0.5">
          {items.map(info => (
            <div key={info.group} className="grid grid-cols-[3rem_1fr_auto] items-center py-1 text-xs sm:text-sm">
              <span className="text-slate-500 font-mono">{info.group}.</span>
              <span className="text-slate-700 truncate">{info.name}</span>
              <span className="num font-mono">{fmt(info.total)}</span>
            </div>
          ))}
        </div>
        <div className="grid grid-cols-2 font-bold mt-1 pt-1 border-t border-slate-200 text-sm">
          <span>{title} 計</span>
          <span className="text-right num font-mono">{fmt(sectionTotal)}</span>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 bg-white border border-slate-200 rounded-lg p-5">
          <h4 className="text-sm font-bold text-slate-900 mb-3">カテゴリ別小計</h4>
          {renderSection('本体工事', body, result.bodyTotal, 'bg-blue-100 text-blue-900')}
          {renderSection('付帯工事', side, result.sideTotal, 'bg-amber-100 text-amber-900')}
          {renderSection('諸経費', overhead, result.overheadTotal, 'bg-green-100 text-green-900')}
          {result.optionsTotal > 0 && (
            <div className="mb-4">
              <div className="text-xs font-bold px-2 py-1 rounded mb-1 bg-orange-100 text-orange-900">オプション工事</div>
              <div className="grid grid-cols-2 font-bold mt-1 pt-1 border-t border-slate-200 text-sm text-orange-700">
                <span>オプション工事 計</span>
                <span className="text-right num font-mono">{fmt(result.optionsTotal)}</span>
              </div>
            </div>
          )}
        </div>
        <div className="text-white rounded-lg p-5 flex flex-col justify-between" style={{ backgroundColor: '#1B2B4B' }}>
          <div>
            {result.roundingAdjust !== 0 && (
              <>
                <div className="text-xs text-slate-400 mb-1">小計（端数調整前）</div>
                <div className="num text-lg font-mono text-slate-300">{fmt(result.rawSubtotal)}</div>
                <div className="text-xs text-amber-300 mt-2 mb-1">お値引き（端数調整）</div>
                <div className="num text-lg font-mono text-amber-200">{fmt(result.roundingAdjust)}</div>
              </>
            )}
            <div className="text-xs text-slate-400 mt-3 mb-2">税抜合計</div>
            <div className="num text-2xl font-mono font-bold">{fmt(result.subtotal)}</div>
            <div className="text-xs text-slate-400 mt-3 mb-1">消費税(10%)</div>
            <div className="num text-lg font-mono">{fmt(result.tax)}</div>
          </div>
          <div className="border-t border-slate-700 pt-3 mt-3">
            <div className="text-xs text-amber-300 mb-1">税込総合計</div>
            <div className="num text-2xl sm:text-3xl font-mono font-bold text-amber-200">{fmt(result.total)}</div>
            <div className="text-xs text-slate-400 mt-2 num">坪単価（税込）: {fmt(result.tsuboCost)} 円/坪</div>
            <div className="text-xs text-slate-500 num">坪単価（税抜）: {fmt(result.scale.tsuboFloor > 0 ? result.subtotal / result.scale.tsuboFloor : 0)} 円/坪</div>
          </div>
        </div>
      </div>

      {/* 端数調整（切り捨て） */}
      <div className="mt-4 bg-white border border-slate-200 rounded-lg p-4 sm:p-5">
        <h4 className="text-sm font-bold ha-navy-text mb-1">💴 端数の調整（お値引き）</h4>
        <p className="text-xs text-slate-600 mb-3">税抜合計を下の単位で切り捨て、差額を「お値引き（端数調整）」として計上します。<strong>値引き額は選んだ時点で固定</strong>されるので、あとで項目を追加・削除しても、そのぶんはきちんと総額に反映されます（再度キリよくしたいときは「今の金額で切り直す」）。</p>
        <div className="flex items-center gap-3 flex-wrap">
          <select value={roundingUnit} onChange={e => setRoundingUnit(e.target.value)}
            className="border-2 rounded-lg px-3 text-sm font-bold" style={{ borderColor: '#1B2B4B', minHeight: '48px', color: '#1B2B4B' }}>
            {ROUNDING_OPTIONS.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
          {roundingUnit > 0 && (
            <button onClick={() => applyRounding(roundingUnit)}
              className="px-4 text-sm font-bold text-white rounded-lg" style={{ backgroundColor: '#1B2B4B', minHeight: '48px' }}>
              今の金額で切り直す
            </button>
          )}
          {result.roundingAdjust !== 0 ? (
            <span className="text-sm">
              お値引き <span className="num font-bold" style={{ color: '#C85400' }}>{fmt(result.roundingAdjust)}</span> 円　→　税抜合計 <span className="num font-bold">{fmt(result.subtotal)}</span> 円
            </span>
          ) : (
            <span className="text-sm text-slate-500">端数調整なし（そのままの金額）</span>
          )}
        </div>
      </div>
    </div>
  );
}

function PrintPreview({ project, result, companyInfo, onChange, onGoSettings }) {
  const format = project.printFormat || 'standard';
  const companyMissing = !((companyInfo?.name || '').trim());
  const isFinalized = project.status === 'finalized';
  const ds = diffSummary(project, result);
  const changed = isFinalized && ds.hasChanges;
  // 出せる帳票：見積書は常に／変更見積書は「確定後＋変更あり」のみ／請求書は確定後のみ
  const canChange = changed;
  const canInvoice = isFinalized;
  // 種類のデフォルトと、選べない種類が選ばれていたときのフォールバック
  let printKind = project.printKind || (changed ? 'change' : 'estimate');
  if (printKind === 'change' && !canChange) printKind = 'estimate';
  if (printKind === 'invoice' && !canInvoice) printKind = 'estimate';
  const setFormat = (f) => onChange(p => ({ ...p, printFormat: f }));
  const setPrintKind = (k) => onChange(p => ({ ...p, printKind: k }));

  // 有効かつ金額ゼロでない項目のみ集計（カテゴリ単位）
  const byGroup = {};
  result.lines.forEach(l => {
    if (!l.enabled) return;
    if (l.amount <= 0) return;
    if (!byGroup[l.categoryGroup]) byGroup[l.categoryGroup] = { name: l.categoryName, category: l.category, total: 0, lines: [] };
    byGroup[l.categoryGroup].total += l.amount;
    byGroup[l.categoryGroup].lines.push(l);
  });
  const filteredByGroup = Object.fromEntries(
    Object.entries(byGroup)
      .filter(([_, info]) => info.lines.length > 0 && info.total > 0)
      .map((entry, i) => ({ entry, i }))
      .sort((a, b) => {
        const ra = sectionRank(a.entry[1].category);
        const rb = sectionRank(b.entry[1].category);
        if (ra !== rb) return ra - rb;
        return a.i - b.i;
      })
      .map(x => x.entry)
  );

  // 変更見積書用：差分計算
  const diff = useMemo(() => {
    if (!project.baseSnapshot) return null;
    return computeDiff(project.baseSnapshot.lines, result.lines);
  }, [project.baseSnapshot, result.lines]);

  return (
    <div>
      <div className="bg-slate-100 px-4 py-3 flex justify-between items-center no-print flex-wrap gap-2">
        <div className="flex items-center gap-3 flex-wrap">
          <span className="text-sm text-slate-600">📄 帳票プレビュー</span>
          <label className="text-xs text-slate-600">種類</label>
          {isFinalized ? (
            <select value={printKind} onChange={e => setPrintKind(e.target.value)}
              className="border border-slate-300 bg-white rounded px-2 py-1 text-sm">
              <option value="estimate">📄 見積書</option>
              {canChange && <option value="change">🔁 変更見積書</option>}
              {canInvoice && <option value="invoice">🧾 請求書</option>}
            </select>
          ) : (
            <span className="text-sm font-semibold text-slate-700">📄 見積書</span>
          )}
          {!isFinalized && (
            <span className="text-xs text-slate-500">（確定すると変更見積書・請求書も出せます）</span>
          )}
          <label className="text-xs text-slate-600 ml-2">書式</label>
          <select value={format} onChange={e => setFormat(e.target.value)}
            className="border border-slate-300 bg-white rounded px-2 py-1 text-sm">
            <option value="standard">① シンプル</option>
            <option value="detailed">② 内訳付き</option>
            <option value="formal">③ 正式（押印欄付き）</option>
          </select>
        </div>
        <div className="flex gap-2 items-center">
          <span className="text-xs text-slate-500">💡 PDF保存はブラウザの「印刷」→「PDFとして保存」</span>
          <button onClick={() => window.print()} className="px-5 text-sm font-bold text-white rounded-lg" style={{ backgroundColor: '#1B2B4B', minHeight: '48px' }}>🖨 印刷する</button>
        </div>
      </div>

      {companyMissing && (
        <div className="bg-amber-50 border-b border-amber-300 text-amber-900 px-4 py-3 no-print flex items-center justify-between flex-wrap gap-2 text-sm">
          <span>会社情報（会社名・住所・電話）が未設定です。このままでも印刷できますが、宛名の下の発行元が空欄になります。</span>
          {onGoSettings && (
            <button onClick={onGoSettings} type="button"
              className="px-4 rounded-lg font-bold text-white shrink-0" style={{ backgroundColor: '#C85400', minHeight: '44px' }}>
              設定で会社情報を入力する
            </button>
          )}
        </div>
      )}

      {/* 種類＝見積書 */}
      {printKind === 'estimate' && format === 'standard' && <FormatStandard project={project} result={result} companyInfo={companyInfo} byGroup={filteredByGroup} />}
      {printKind === 'estimate' && format === 'detailed' && <FormatDetailed project={project} result={result} companyInfo={companyInfo} byGroup={filteredByGroup} />}
      {printKind === 'estimate' && format === 'formal' && <FormatFormal project={project} result={result} companyInfo={companyInfo} byGroup={filteredByGroup} />}

      {/* 種類＝変更見積書 */}
      {printKind === 'change' && diff && (
        <FormatChangeOrder project={project} result={result} companyInfo={companyInfo} diff={diff} format={format} />
      )}

      {/* 種類＝請求書 */}
      {printKind === 'invoice' && <FormatInvoice project={project} result={result} companyInfo={companyInfo} onChange={onChange} format={format} />}
    </div>
  );
}

// 書式① シンプル
function FormatStandard({ project, result, companyInfo, byGroup }) {
  return (
    <div className="bg-white p-8 shadow-inner">
      <div className="text-center mb-8">
        <h1 className="text-3xl font-bold tracking-widest">御 見 積 書</h1>
      </div>
      <div className="grid grid-cols-2 gap-8 mb-8">
        <div>
          <div className="text-lg font-bold border-b border-slate-400 pb-2">{project.clientName ? `${cleanClientName(project.clientName)} 様` : '○○○○ 様'}</div>
          <div className="text-sm text-slate-600 mt-3">
            <div>工事名: {project.propertyName || project.name}</div>
            {project.propertyName ? <div>見積名: {project.name}</div> : null}
            {project.siteAddress && <div>現場: {project.siteAddress}</div>}
            <div>下記の通りお見積もり申し上げます。</div>
          </div>
        </div>
        <div className="text-right">
          <div className="text-sm text-slate-600">発行日: {fmtDate(new Date().toISOString())}</div>
          <div className="mt-2 text-sm">
            <div className="font-bold">{companyInfo?.name || ''}</div>
            <div className="text-xs text-slate-600">{companyInfo?.address || ''}</div>
            <div className="text-xs text-slate-600">{companyInfo?.phone || ''}</div>
            {companyInfo?.email && <div className="text-xs text-slate-600">{companyInfo.email}</div>}
            {companyInfo?.representative && <div className="text-xs text-slate-600 mt-1">代表 {companyInfo.representative}</div>}
            {project.staffName && <div className="text-xs text-slate-600">担当 {project.staffName}</div>}
            {companyInfo?.stampImage && (
              <div className="mt-2 flex justify-end">
                <img src={companyInfo.stampImage} alt="印" className="h-14 w-14 object-contain" />
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="border-2 border-slate-800 p-4 mb-6 flex items-center justify-between">
        <span className="text-lg font-bold">税込総額</span>
        <div className="text-right">
          <span className="num text-3xl font-bold">¥{fmt(result.total)}</span>
          <span className="text-sm text-slate-500 ml-2">({fmt(result.subtotal)} + 消費税 {fmt(result.tax)})</span>
        </div>
      </div>
      <div className="text-xs text-slate-600 mb-4 grid grid-cols-4 gap-2 border border-slate-200 rounded p-2">
        <div>延床: <span className="num font-semibold">{project.scale.tsuboFloor}坪</span></div>
        <div>階数: <span className="font-semibold">{project.scale.floorCount}階建</span></div>
        <div>屋根: <span className="font-semibold">{project.scale.roofShape}</span></div>
        <div>坪単価(税込): <span className="num font-semibold">{fmt(result.tsuboCost)}円/坪</span></div>
      </div>
      <h3 className="font-bold text-lg mb-2">工事内訳</h3>
      <SummaryTable byGroup={byGroup} result={result} />
      <FooterNotes />
    </div>
  );
}

// 書式② 内訳付き
function FormatDetailed({ project, result, companyInfo, byGroup }) {
  return (
    <div className="bg-white p-8 shadow-inner">
      <div className="text-center mb-6">
        <h1 className="text-3xl font-bold tracking-widest">御 見 積 書</h1>
        <div className="text-sm text-slate-500 mt-1">（明細付き）</div>
      </div>
      <div className="grid grid-cols-2 gap-8 mb-6">
        <div>
          <div className="text-lg font-bold border-b border-slate-400 pb-2">{project.clientName ? `${cleanClientName(project.clientName)} 様` : '○○○○ 様'}</div>
          <div className="text-sm text-slate-600 mt-3">
            <div>工事名: {project.propertyName || project.name}</div>
            {project.propertyName ? <div>見積名: {project.name}</div> : null}
            {project.siteAddress && <div>現場: {project.siteAddress}</div>}
          </div>
        </div>
        <div className="text-right text-sm">
          <div className="text-slate-600">発行日: {fmtDate(new Date().toISOString())}</div>
          <div className="mt-2 font-bold">{companyInfo?.name || ''}</div>
          <div className="text-xs text-slate-600">{companyInfo?.address || ''}</div>
          <div className="text-xs text-slate-600">{companyInfo?.phone || ''}</div>
          {companyInfo?.email && <div className="text-xs text-slate-600">{companyInfo.email}</div>}
          {companyInfo?.stampImage && (
            <div className="mt-2 flex justify-end">
              <img src={companyInfo.stampImage} alt="印" className="h-14 w-14 object-contain" />
            </div>
          )}
        </div>
      </div>
      <div className="border-2 border-slate-800 p-3 mb-6 flex items-center justify-between">

        <span className="num text-2xl font-bold">¥{fmt(result.total)}</span>

      <SummaryTable byGroup={byGroup} result={result} />

      <div className="print-page-break"></div>
      <h3 className="font-bold text-base mt-6 mb-2">内訳明細</h3>

        info.lines.length > 0 && (
          <div key={g} className="mb-4 print-avoid-break">
            <div className="font-bold bg-slate-200 px-2 py-1 text-sm">{g}. {info.name}（小計 {fmt(info.total)} 円）</div>
            <table className="w-full text-xs border-collapse" style={{tableLayout: 'fixed'}}>
              <colgroup>
                <col style={{width:'48px'}} />
                <col style={{width:'180px'}} />
                <col />
                <col style={{width:'72px'}} />
                <col style={{width:'40px'}} />
                <col style={{width:'80px'}} />
                <col style={{width:'96px'}} />
              </colgroup>
              <thead>
                <tr className="bg-slate-100 border-b border-slate-300">
                  <th className="px-2 py-1 text-left">No.</th>
                  <th className="px-2 py-1 text-left">内訳名</th>
                  <th className="px-2 py-1 text-left">規格・仕様</th>
                  <th className="px-2 py-1 text-right">数量</th>
                  <th className="px-2 py-1 text-left">単位</th>
                  <th className="px-2 py-1 text-right">単価</th>
                  <th className="px-2 py-1 text-right">金額</th>
                </tr>
              </thead>
              <tbody>
                {info.lines.map(l => (
                  <tr key={l.no} className="border-b border-slate-100">
                    <td className="px-2 py-1 font-mono">{l.displayNo || l.no}</td>
                    <td className="px-2 py-1 truncate" title={l.name}>{l.name}</td>
                    <td className="px-2 py-1 text-slate-600 truncate" title={l.spec}>{l.spec}</td>
                    <td className="px-2 py-1 text-right num font-mono">{l.quantity.toFixed(l.quantity % 1 === 0 ? 0 : 2)}</td>
                    <td className="px-2 py-1">{l.unit}</td>
                    <td className="px-2 py-1 text-right num font-mono">{fmt(l.effectivePrice)}</td>
                    <td className="px-2 py-1 text-right num font-mono font-semibold">{fmt(l.amount)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      ))}
      <FooterNotes />
    </div>
  );
}

// 書式③ 正式見積書（押印・罫線多め）
function FormatFormal({ project, result, companyInfo, byGroup }) {
  return (
    <div className="bg-white p-8 shadow-inner">
      <div className="text-center mb-8">
        <h1 className="text-4xl font-bold tracking-widest border-b-4 border-slate-800 inline-block pb-2 px-8">御 見 積 書</h1>
        <div className="text-sm text-slate-600 mt-3">No. {project.id.slice(-8).toUpperCase()}</div>
      </div>
      <div className="grid grid-cols-[1fr_auto] gap-8 mb-6">
        <div className="border border-slate-400 p-4">
          <div className="text-base font-bold mb-3">{project.clientName ? cleanClientName(project.clientName) : '○○○○'} <span className="text-sm">様</span></div>
          <table className="w-full text-sm">
            <tbody>
              <tr className="border-t border-slate-200"><td className="py-1.5 text-slate-600 w-24">件名</td><td className="py-1.5">{project.propertyName || project.name}</td></tr>
              {project.propertyName ? <tr className="border-t border-slate-200"><td className="py-1.5 text-slate-600">見積名</td><td className="py-1.5">{project.name}</td></tr> : null}
              <tr className="border-t border-slate-200"><td className="py-1.5 text-slate-600">工事場所</td><td className="py-1.5">{project.siteAddress || '—'}</td></tr>
              <tr className="border-t border-slate-200"><td className="py-1.5 text-slate-600">工事概要</td><td className="py-1.5">{project.scale.tsuboFloor}坪・{project.scale.floorCount}階建・{project.scale.roofShape}屋根</td></tr>
              <tr className="border-t border-slate-200"><td className="py-1.5 text-slate-600">有効期限</td><td className="py-1.5">発行日より30日</td></tr>
            </tbody>
          </table>
        </div>
        <div>
          <div className="text-sm text-slate-600 text-right mb-3">発行日: {fmtDate(new Date().toISOString())}</div>
          <div className="border border-slate-400 p-3 text-sm">
            <div className="font-bold text-base">{companyInfo?.name || ''}</div>
            <div className="text-xs text-slate-600 mt-1">{companyInfo?.address || ''}</div>
            <div className="text-xs text-slate-600">TEL {companyInfo?.phone || ''}</div>
            {companyInfo?.email && <div className="text-xs text-slate-600">{companyInfo.email}</div>}
            <div className="text-xs text-slate-600 mt-2">代表 {companyInfo?.representative || ''}</div>
            <div className="text-xs text-slate-600">担当 {project.staffName || ''}</div>
            <div className="mt-3 flex items-center justify-end">
              {companyInfo?.stampImage ? (
                <img src={companyInfo.stampImage} alt="印" className="h-16 w-16 object-contain" />
              ) : (
                <div className="inline-block border-2 border-red-700 text-red-700 px-3 py-2 rounded font-bold text-xs">印</div>
              )}
            </div>
          </div>
        </div>
      </div>

      <div className="border-4 border-double border-slate-800 p-4 mb-6">
        <div className="text-center">
          <div className="text-sm text-slate-600 mb-1">下記の通りお見積もり申し上げます</div>
          <div className="num text-4xl font-bold tracking-wider mt-2">¥ {fmt(result.total)} <span className="text-base text-slate-600">（税込）</span></div>
          <div className="text-xs text-slate-500 mt-2">（うち消費税 {fmt(result.tax)} 円）</div>
        </div>
      </div>

      <SummaryTable byGroup={byGroup} result={result} bordered />

      <div className="mt-6 grid grid-cols-2 gap-4 text-xs">
        <div className="border border-slate-300 p-2">
          <div className="font-bold mb-1">支払条件</div>
          <div className="text-slate-600">契約時 30%／上棟時 30%／引渡時 40%（応相談）</div>
        </div>
        <div className="border border-slate-300 p-2">
          <div className="font-bold mb-1">工期</div>
          <div className="text-slate-600">契約後 約 4〜5ヶ月（規模により変動）</div>
        </div>
      </div>
      <FooterNotes />
