}

function SummaryTable({ byGroup, result, bordered }) {
  const cls = bordered ? "border border-slate-400" : "";
  return (
    <table className={`w-full text-sm border-collapse ${cls}`}>
      <thead>
        <tr className="bg-slate-100 border-b-2 border-slate-400">
          <th className={`px-2 py-1.5 text-left ${bordered ? 'border-r border-slate-300' : ''}`}>No.</th>
          <th className={`px-2 py-1.5 text-left ${bordered ? 'border-r border-slate-300' : ''}`}>工種</th>
          <th className="px-2 py-1.5 text-right">金額(円)</th>
        </tr>
      </thead>
      <tbody>
        {Object.entries(byGroup).map(([g, info]) => (
          <tr key={g} className="border-b border-slate-200">
            <td className={`px-2 py-1.5 font-mono ${bordered ? 'border-r border-slate-300' : ''}`}>{g}</td>
            <td className={`px-2 py-1.5 ${bordered ? 'border-r border-slate-300' : ''}`}>{info.name}</td>
            <td className="px-2 py-1.5 text-right num font-mono">{fmt(info.total)}</td>
          </tr>
        ))}
        <tr className="border-b border-slate-300 font-bold bg-slate-50">
          <td colSpan="2" className="px-2 py-1.5 text-right">本体工事計</td>
          <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.bodyTotal)}</td>
        </tr>
        <tr className="border-b border-slate-300 font-bold bg-slate-50">
          <td colSpan="2" className="px-2 py-1.5 text-right">付帯工事計</td>
          <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.sideTotal)}</td>
        </tr>
        <tr className="border-b border-slate-300 font-bold bg-slate-50">
          <td colSpan="2" className="px-2 py-1.5 text-right">諸経費計</td>
          <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.overheadTotal)}</td>
        </tr>
        {result.optionsTotal > 0 && (
          <tr className="border-b border-slate-300 font-bold bg-slate-50">
            <td colSpan="2" className="px-2 py-1.5 text-right">オプション工事</td>
            <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.optionsTotal)}</td>
          </tr>
        )}
        {result.roundingAdjust !== 0 && (
          <>
            <tr className="border-b border-slate-200">
              <td colSpan="2" className="px-2 py-1.5 text-right">小計</td>
              <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.rawSubtotal)}</td>
            </tr>
            <tr className="border-b border-slate-300 font-bold" style={{ color: '#C85400' }}>
              <td colSpan="2" className="px-2 py-1.5 text-right">お値引き（端数調整）</td>
              <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.roundingAdjust)}</td>
            </tr>
          </>
        )}
        <tr className="border-b-2 border-slate-400 font-bold">
          <td colSpan="2" className="px-2 py-2 text-right">税抜合計</td>
          <td className="px-2 py-2 text-right num font-mono">{fmt(result.subtotal)}</td>
        </tr>
        <tr className="border-b border-slate-300">
          <td colSpan="2" className="px-2 py-1.5 text-right">消費税(10%)</td>
          <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.tax)}</td>
        </tr>
        <tr className="border-b-4 border-slate-800 bg-slate-100 font-bold text-base">
          <td colSpan="2" className="px-2 py-2 text-right">税込総合計</td>
          <td className="px-2 py-2 text-right num font-mono">¥{fmt(result.total)}</td>
        </tr>
      </tbody>
    </table>
  );
}

function FooterNotes() {
  return (
    <div className="mt-6 text-xs text-slate-500 leading-relaxed">
      <p>※ 本見積書の有効期限は発行日より30日間です。</p>
      <p>※ 別途追加工事が発生した場合は、別途お見積もりいたします。</p>
      <p>※ 諸条件・支払条件等は別途ご相談ください。</p>
    </div>
  );
}

// ============ 変更御見積書（差分視覚化） ============
function ChangeRow({ row, showUnchanged }) {
  if (row.status === 'unchanged' && !showUnchanged) return null;
  const before = row.before; const after = row.after;
  if (row.status === 'unchanged') {
    return (
      <tr className="border-b border-slate-100 text-slate-700">
        <td className="px-2 py-1 font-mono text-xs">{after.no}</td>
        <td className="px-2 py-1 text-xs">{after.name}</td>
        <td className="px-2 py-1 text-[11px] text-slate-500">{after.spec}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmtQty(after.quantity)} {after.unit}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmt(lineUnitPrice(after))}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmt(after.amount)}</td>
        <td className="px-2 py-1 text-center text-[10px] text-slate-400">—</td>
      </tr>
    );
  }
  if (row.status === 'modified') {
    return (
      <>
        <tr className="bg-slate-50 text-slate-500 line-through">
          <td className="px-2 py-1 font-mono text-xs">{before.no}</td>
          <td className="px-2 py-1 text-xs">{before.name}</td>
          <td className="px-2 py-1 text-[11px] no-underline text-slate-400">{before.spec}</td>
          <td className="px-2 py-1 text-right num text-xs">{fmtQty(before.quantity)} {before.unit}</td>
          <td className="px-2 py-1 text-right num text-xs">{fmt(lineUnitPrice(before))}</td>
          <td className="px-2 py-1 text-right num text-xs">{fmt(before.amount)}</td>
          <td rowSpan={2} className="px-2 py-1 text-center text-xs font-bold text-orange-700 bg-orange-50 no-underline align-middle border-l border-orange-300">変更</td>
        </tr>
        <tr className="bg-orange-50 border-b-2 border-orange-300 text-orange-900 font-semibold">
          <td className="px-2 py-1 font-mono text-xs">↳ {after.no}</td>
          <td className="px-2 py-1 text-xs">{after.name}</td>
          <td className="px-2 py-1 text-[11px] font-normal text-orange-700">{after.spec}</td>
          <td className="px-2 py-1 text-right num text-xs">{fmtQty(after.quantity)} {after.unit}</td>
          <td className="px-2 py-1 text-right num text-xs">{fmt(lineUnitPrice(after))}</td>
          <td className="px-2 py-1 text-right num text-xs">{fmt(after.amount)}
            <div className="text-[10px] font-normal">
              ({(() => {
                const d = (after.amount || 0) - (before.amount || 0);
                return (d >= 0 ? '+' : '−') + fmt(Math.abs(d));
              })()})
            </div>
          </td>
        </tr>
      </>
    );
  }
  if (row.status === 'added') {
    return (
      <tr className="bg-green-50 border-b border-green-300 text-green-900 font-semibold">
        <td className="px-2 py-1 font-mono text-xs">＋ {after.no}</td>
        <td className="px-2 py-1 text-xs">{after.name}</td>
        <td className="px-2 py-1 text-[11px] font-normal text-green-700">{after.spec}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmtQty(after.quantity)} {after.unit}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmt(lineUnitPrice(after))}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmt(after.amount)}</td>
        <td className="px-2 py-1 text-center text-xs font-bold text-green-700 bg-green-100 border-l border-green-300">追加</td>
      </tr>
    );
  }
  if (row.status === 'deleted') {
    return (
      <tr className="bg-red-50 border-b border-red-300 text-red-700 line-through">
        <td className="px-2 py-1 font-mono text-xs">− {before.no}</td>
        <td className="px-2 py-1 text-xs">{before.name}</td>
        <td className="px-2 py-1 text-[11px] no-underline text-red-600">{before.spec}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmtQty(before.quantity)} {before.unit}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmt(lineUnitPrice(before))}</td>
        <td className="px-2 py-1 text-right num text-xs">{fmt(before.amount)}</td>
        <td className="px-2 py-1 text-center text-xs font-bold text-red-700 bg-red-100 no-underline border-l border-red-300">削除</td>
      </tr>
    );
  }
  return null;
}

function FormatChangeOrder({ project, result, companyInfo, diff, format }) {
  const showUnchanged = format !== 'standard';   // ①シンプル＝変更点のみ／②③＝全項目
  const showStamp = format === 'formal';
  const baseTotal = project.baseSnapshot?.totals?.total || 0;
  const baseSubtotal = project.baseSnapshot?.totals?.subtotal || 0;

  // カテゴリグループごとに行をまとめて表示
  const rowsByGroup = {};
  diff.rows.forEach(r => {
    const key = r.categoryGroup || '_';
    if (!rowsByGroup[key]) rowsByGroup[key] = { category: r.category, categoryName: r.categoryName, rows: [] };
    rowsByGroup[key].rows.push(r);
  });

  return (
    <div className="bg-white p-8 shadow-inner">
      <div className="text-center mb-6">
        <h1 className="text-3xl font-bold tracking-widest text-orange-700">変 更 御 見 積 書</h1>
        <div className="text-sm text-slate-600 mt-2">
          {project.baseSnapshot?.finalizedAt ? `確定見積（${fmtDate(project.baseSnapshot.finalizedAt)} 確定）からの変更内容` : '確定見積からの変更内容'}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-8 mb-6">
        <div>
          <div className="text-lg font-bold border-b border-slate-400 pb-2">
            {project.clientName ? `${cleanClientName(project.clientName)} 様` : '○○○○ 様'}
          </div>
          <div className="text-sm text-slate-600 mt-3">
            <div>工事名: {project.propertyName || project.name}</div>
            {project.propertyName ? <div>見積名: {project.name}</div> : null}
            {project.siteAddress && <div>現場: {project.siteAddress}</div>}
            <div className="mt-2">下記の通り、見積内容の変更をお願い申し上げます。</div>
          </div>
        </div>
        <div className="text-right">
          <div className="text-sm text-slate-600">発行日: {fmtDate(new Date().toISOString())}</div>
          {project.baseSnapshot?.finalizedAt && (
            <div className="text-xs text-slate-500">元見積確定日: {fmtDate(project.baseSnapshot.finalizedAt)}</div>
          )}
          <div className="mt-2 text-sm">
            <div className="font-bold">{companyInfo?.name || ''}</div>
            <div className="text-xs text-slate-600">{companyInfo?.address || ''}</div>
            <div className="text-xs text-slate-600">{companyInfo?.phone || ''}</div>
            {companyInfo?.representative && <div className="text-xs text-slate-600 mt-1">代表 {companyInfo.representative}</div>}
            {project.staffName && <div className="text-xs text-slate-600">担当 {project.staffName}</div>}
            {showStamp && companyInfo?.stampImage && (
              <div className="mt-2 flex justify-end"><img src={companyInfo.stampImage} alt="印" className="h-14 w-14 object-contain" /></div>
            )}
          </div>
        </div>
      </div>

      {/* 差額サマリーボックス */}
      <div className="border-2 border-orange-600 rounded-lg p-4 mb-6 bg-orange-50">
        <div className="grid grid-cols-3 gap-4 text-center">
          <div>
            <div className="text-xs text-slate-600">変更前 税込総額</div>
            <div className="num text-xl font-bold text-slate-700 mt-1">¥{fmt(baseTotal)}</div>
          </div>
          <div className="text-center self-center">
            <div className="text-2xl font-bold text-orange-700">→</div>
          </div>
          <div>
            <div className="text-xs text-slate-600">変更後 税込総額</div>
            <div className="num text-xl font-bold text-slate-900 mt-1">¥{fmt(result.total)}</div>
          </div>
        </div>
        <div className="mt-4 pt-3 border-t border-orange-300 text-center">
          <div className="text-sm text-slate-600">変更差額（増減）</div>
          {(() => {
            const d = result.total - baseTotal;
            const sign = d >= 0 ? '＋' : '−';
            const color = d >= 0 ? 'text-red-700' : 'text-blue-700';
            const label = d >= 0 ? '増額' : '減額';
            return (
              <div className={`num text-3xl font-bold ${color} mt-1`}>
                {sign} ¥{fmt(Math.abs(d))} <span className="text-sm font-normal ml-2">({label})</span>
              </div>
            );
          })()}
        </div>
        <div className="mt-3 grid grid-cols-4 gap-2 text-xs text-slate-600">
          <div className="text-center"><span className="font-semibold">変更</span>: {diff.counts.modified} 項目</div>
          <div className="text-center"><span className="font-semibold text-green-700">追加</span>: {diff.counts.added} 項目</div>
          <div className="text-center"><span className="font-semibold text-red-700">削除</span>: {diff.counts.deleted} 項目</div>
          <div className="text-center"><span className="font-semibold">据置</span>: {diff.counts.unchanged} 項目</div>
        </div>
      </div>

      {/* 差分テーブル */}
      <h3 className="font-bold text-lg mb-2">
        {showUnchanged ? '工事内訳（全項目）' : '変更点一覧'}
      </h3>
      <table className="w-full text-sm border border-slate-300 border-collapse mb-6">
        <thead>
          <tr className="bg-slate-100 border-b-2 border-slate-400">
            <th className="px-2 py-1.5 text-left border-r border-slate-300 w-16">No.</th>
            <th className="px-2 py-1.5 text-left border-r border-slate-300">品名</th>
            <th className="px-2 py-1.5 text-left border-r border-slate-300">規格・仕様</th>
            <th className="px-2 py-1.5 text-right border-r border-slate-300 w-24">数量</th>
            <th className="px-2 py-1.5 text-right border-r border-slate-300 w-24">単価</th>
            <th className="px-2 py-1.5 text-right border-r border-slate-300 w-28">金額</th>
            <th className="px-2 py-1.5 text-center w-20">区分</th>
          </tr>
        </thead>
        <tbody>
          {Object.entries(rowsByGroup).map(([gKey, grp]) => {
            const hasChange = grp.rows.some(r => r.status !== 'unchanged');
            if (!showUnchanged && !hasChange) return null;
            return (
              <React.Fragment key={gKey}>
                <tr className="bg-slate-200">
                  <td colSpan="7" className="px-2 py-1 font-semibold text-slate-700 text-xs">
                    [{gKey}] {grp.categoryName}（{grp.category}）
                  </td>
                </tr>
                {grp.rows.map((r, i) => (
                  <ChangeRow key={i} row={r} showUnchanged={showUnchanged} />
                ))}
              </React.Fragment>
            );
          })}
        </tbody>
        <tfoot>
          <tr className="border-t-2 border-slate-400 bg-slate-50">
            <td colSpan="5" className="px-2 py-1.5 text-right font-bold">変更前 税抜合計</td>
            <td className="px-2 py-1.5 text-right num font-mono">{fmt(baseSubtotal)}</td>
            <td></td>
          </tr>
          {result.roundingAdjust !== 0 && (
            <>
              <tr className="bg-slate-50">
                <td colSpan="5" className="px-2 py-1.5 text-right">変更後 小計</td>
                <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.rawSubtotal)}</td>
                <td></td>
              </tr>
              <tr className="bg-slate-50 font-bold" style={{ color: '#C85400' }}>
                <td colSpan="5" className="px-2 py-1.5 text-right">お値引き（端数調整）</td>
                <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.roundingAdjust)}</td>
                <td></td>
              </tr>
            </>
          )}
          <tr className="bg-slate-50">
            <td colSpan="5" className="px-2 py-1.5 text-right font-bold">変更後 税抜合計</td>
            <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.subtotal)}</td>
            <td></td>
          </tr>
          <tr className="border-b border-slate-300">
            <td colSpan="5" className="px-2 py-1.5 text-right">消費税(10%)</td>
            <td className="px-2 py-1.5 text-right num font-mono">{fmt(result.tax)}</td>
            <td></td>
          </tr>
          <tr className="border-b-4 border-orange-700 bg-orange-50 font-bold text-base">
            <td colSpan="5" className="px-2 py-2 text-right">変更後 税込総合計</td>
            <td className="px-2 py-2 text-right num font-mono">¥{fmt(result.total)}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>

      {/* オプション工事の差分 */}
      {(() => {
        const baseOpts = project.baseSnapshot?.options || [];
        const curOpts = project.options || [];
        const baseMap = new Map(baseOpts.map(o => [o.id, o]));
        const curMap = new Map(curOpts.map(o => [o.id, o]));
        const optRows = [];
        baseMap.forEach((bo, id) => {
          const co = curMap.get(id);
          if (!co) optRows.push({ status: 'deleted', before: bo, after: null });
          else if (bo.name !== co.name || Number(bo.amount) !== Number(co.amount)) optRows.push({ status: 'modified', before: bo, after: co });
          else optRows.push({ status: 'unchanged', before: bo, after: co });
        });
        curMap.forEach((co, id) => { if (!baseMap.has(id)) optRows.push({ status: 'added', before: null, after: co }); });
        const hasChange = optRows.some(r => r.status !== 'unchanged');
        if (!hasChange && !showUnchanged) return null;
        if (optRows.length === 0) return null;
        const rowStyle = (s) => s === 'modified' ? 'bg-orange-50' : s === 'added' ? 'bg-green-50 text-green-900' : s === 'deleted' ? 'bg-red-50 text-red-700 line-through' : '';
        const tag = (s) => s === 'modified' ? '変更' : s === 'added' ? '追加' : s === 'deleted' ? '削除' : '—';
        const tagCls = (s) => s === 'modified' ? 'text-orange-700 bg-orange-100' : s === 'added' ? 'text-green-700 bg-green-100' : s === 'deleted' ? 'text-red-700 bg-red-100' : 'text-slate-400';
        return (
          <>
            <h3 className="font-bold text-lg mb-2">オプション工事の変更</h3>
            <table className="w-full text-sm border border-slate-300 border-collapse mb-6">
              <thead>
                <tr className="bg-slate-100 border-b-2 border-slate-400">
                  <th className="px-2 py-1.5 text-left border-r border-slate-300">名称</th>
                  <th className="px-2 py-1.5 text-right border-r border-slate-300 w-32">金額</th>
                  <th className="px-2 py-1.5 text-center w-20">区分</th>
                </tr>
              </thead>
              <tbody>
                {optRows.map((r, i) => {
                  if (r.status === 'unchanged' && !showUnchanged) return null;
                  if (r.status === 'modified') {
                    return (
                      <React.Fragment key={i}>
                        <tr className="bg-slate-50 text-slate-500 line-through">
                          <td className="px-2 py-1 text-xs border-r border-slate-200">{r.before.name}</td>
                          <td className="px-2 py-1 text-right num text-xs border-r border-slate-200">{fmt(r.before.amount)}</td>
                          <td rowSpan={2} className={`px-2 py-1 text-center text-xs font-bold no-underline align-middle border-l border-orange-300 ${tagCls('modified')}`}>変更</td>
                        </tr>
                        <tr className="bg-orange-50 border-b-2 border-orange-300 text-orange-900 font-semibold">
                          <td className="px-2 py-1 text-xs border-r border-orange-200">↳ {r.after.name}</td>
                          <td className="px-2 py-1 text-right num text-xs border-r border-orange-200">
                            {fmt(r.after.amount)}
                            <span className="text-[10px] font-normal ml-1">
                              ({(() => { const d = (r.after.amount||0)-(r.before.amount||0); return (d>=0?'+':'−')+fmt(Math.abs(d)); })()})
                            </span>
                          </td>
                        </tr>
                      </React.Fragment>
                    );
                  }
                  return (
                    <tr key={i} className={`border-b border-slate-200 ${rowStyle(r.status)}`}>
                      <td className="px-2 py-1 text-xs border-r border-slate-200">
                        {r.status === 'added' && '＋ '}
                        {r.status === 'deleted' && '− '}
                        {(r.after || r.before).name}
                      </td>
                      <td className="px-2 py-1 text-right num text-xs border-r border-slate-200">{fmt((r.after || r.before).amount)}</td>
                      <td className={`px-2 py-1 text-center text-xs font-bold no-underline border-l border-slate-300 ${tagCls(r.status)}`}>{tag(r.status)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </>
        );
      })()}

      {showStamp && (
        <div className="mt-8 flex justify-end gap-4">
          <div className="border border-slate-400 rounded w-24 h-24 flex flex-col items-center justify-center">
            <div className="text-xs text-slate-600">承認</div>
            <div className="flex-1"></div>
          </div>
          <div className="border border-slate-400 rounded w-24 h-24 flex flex-col items-center justify-center">
            <div className="text-xs text-slate-600">確認</div>
            <div className="flex-1"></div>
          </div>
          <div className="border border-slate-400 rounded w-24 h-24 flex flex-col items-center justify-center">
            <div className="text-xs text-slate-600">担当</div>
            <div className="flex-1"></div>
          </div>
        </div>
      )}

      <div className="mt-6 text-xs text-slate-500 leading-relaxed">
        <p>※ 本変更見積書の有効期限は発行日より30日間です。</p>
        <p>※ 確定済みの見積に対する変更分を反映しています。</p>
        <p>※ 変更にご同意いただける場合は、本書にご捺印のうえご返送ください。</p>
      </div>
    </div>
  );
}

// ============ 請求書 ============
function FormatInvoice({ project, result, companyInfo, onChange, format }) {
  const cfg = project.invoiceConfig || { issueDate: '', dueDate: '', bankInfo: '', splits: [] };
  const total = result.total;

  const computeAmount = (split) => {
    if (split.fixed !== '' && split.fixed !== null && split.fixed !== undefined) {
      return Math.round(parseFloat(split.fixed) || 0);
    }
    return Math.round((total * (parseFloat(split.pct) || 0)) / 100);
  };
  const splitsWithAmount = (cfg.splits || []).map(s => ({ ...s, amount: computeAmount(s) }));
  const splitsTotal = splitsWithAmount.reduce((s, x) => s + x.amount, 0);
  const balance = total - splitsTotal;

  const updateCfg = (updater) => onChange(p => ({ ...p, invoiceConfig: updater(p.invoiceConfig || cfg) }));
  const updateSplit = (i, key, val) => updateCfg(c => ({
    ...c,
    splits: (c.splits || []).map((s, idx) => idx === i ? { ...s, [key]: val } : s)
  }));
  const addSplit = () => updateCfg(c => ({ ...c, splits: [...(c.splits || []), { name: '追加金', pct: 0, fixed: '' }] }));
  const removeSplit = (i) => updateCfg(c => ({ ...c, splits: (c.splits || []).filter((_, idx) => idx !== i) }));

  return (
    <div>
      {/* 編集パネル（印刷時は非表示） */}
      <div className="bg-amber-50 border-b border-amber-300 p-4 no-print">
        <div className="text-sm font-semibold text-amber-900 mb-3">🧾 請求書 設定（編集はここで／印刷物には出ません）</div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
          <label className="text-xs text-slate-700">
            <div>発行日</div>
            <input type="date" value={cfg.issueDate || ''} onChange={e => updateCfg(c => ({ ...c, issueDate: e.target.value }))}
              className="w-full border border-slate-300 rounded px-2 py-1 text-sm bg-white" />
          </label>
          <label className="text-xs text-slate-700">
            <div>支払期限</div>
            <input type="date" value={cfg.dueDate || ''} onChange={e => updateCfg(c => ({ ...c, dueDate: e.target.value }))}
              className="w-full border border-slate-300 rounded px-2 py-1 text-sm bg-white" />
          </label>
          <label className="text-xs text-slate-700 col-span-2 md:col-span-1">
            <div>振込先（任意）</div>
            <input type="text" value={cfg.bankInfo || ''} onChange={e => updateCfg(c => ({ ...c, bankInfo: e.target.value }))}
              placeholder="○○銀行 ○○支店 普通 1234567"
              className="w-full border border-slate-300 rounded px-2 py-1 text-sm bg-white" />
          </label>
        </div>
        <div className="text-xs font-semibold text-slate-700 mb-1">分割設定（％または固定額。固定額が入っていればそれを優先）</div>
        <table className="w-full text-xs bg-white border border-slate-300">
          <thead className="bg-slate-100">
            <tr>
              <th className="px-2 py-1 text-left">名称</th>
              <th className="px-2 py-1 text-right w-20">％</th>
              <th className="px-2 py-1 text-right w-32">固定額（円）</th>
              <th className="px-2 py-1 text-right w-32">計算額</th>
              <th className="w-10"></th>
            </tr>
          </thead>
          <tbody>
            {splitsWithAmount.map((s, i) => (
              <tr key={i} className="border-t border-slate-200">
                <td className="px-2 py-1"><input value={s.name} onChange={e => updateSplit(i, 'name', e.target.value)} className="w-full border border-slate-300 rounded px-1 py-0.5" /></td>
                <td className="px-2 py-1 text-right"><input type="number" value={s.pct} onChange={e => updateSplit(i, 'pct', e.target.value)} className="w-full border border-slate-300 rounded px-1 py-0.5 text-right" /></td>
                <td className="px-2 py-1 text-right"><input type="number" value={s.fixed} onChange={e => updateSplit(i, 'fixed', e.target.value)} placeholder="空欄＝％計算" className="w-full border border-slate-300 rounded px-1 py-0.5 text-right" /></td>
                <td className="px-2 py-1 text-right num font-mono">{fmt(s.amount)}</td>
                <td className="px-2 py-1 text-center"><button onClick={() => removeSplit(i)} className="text-red-600 hover:bg-red-50 rounded px-1">×</button></td>
              </tr>
            ))}
            <tr className="bg-slate-50 border-t border-slate-300">
              <td colSpan="3" className="px-2 py-1 text-right text-xs">分割合計 / 見積総額</td>
              <td className="px-2 py-1 text-right num font-mono font-bold">{fmt(splitsTotal)} / {fmt(total)}</td>
              <td></td>
            </tr>
            {balance !== 0 && (
              <tr className="bg-red-50">
                <td colSpan="3" className="px-2 py-1 text-right text-xs text-red-700">差額（残）</td>
                <td className="px-2 py-1 text-right num font-mono text-red-700">{fmt(balance)}</td>
                <td></td>
              </tr>
            )}
          </tbody>
        </table>
        <button onClick={addSplit} className="mt-2 text-xs px-2 py-1 border border-slate-300 rounded hover:bg-white">＋ 分割を追加</button>
        <div className="text-xs text-slate-500 mt-2">💡 全期一括にしたい場合は「最終金100％」だけ残してください。</div>
      </div>

      {/* 請求書本体（印刷対象） */}
      <InvoiceBody project={project} result={result} companyInfo={companyInfo} cfg={cfg} splitsWithAmount={splitsWithAmount} format={format} />
    </div>
  );
}

function InvoiceBody({ project, result, companyInfo, cfg, splitsWithAmount, format }) {
  const total = result.total;
  const showStamp = format === 'formal';
  const showDetail = format === 'detailed';

  return (
    <div className="bg-white p-8 shadow-inner">
      <div className="text-center mb-6">
        <h1 className="text-3xl font-bold tracking-widest">御 請 求 書</h1>
      </div>

      <div className="grid grid-cols-2 gap-8 mb-6">
        <div>
          <div className="text-lg font-bold border-b border-slate-400 pb-2">
            {project.clientName ? `${cleanClientName(project.clientName)} 様` : '○○○○ 様'}
          </div>
          <div className="text-sm text-slate-600 mt-3">
            <div>工事名: {project.propertyName || project.name}</div>
            {project.propertyName ? <div>見積名: {project.name}</div> : null}
            {project.siteAddress && <div>現場: {project.siteAddress}</div>}
            <div className="mt-2">下記の通りご請求申し上げます。</div>
          </div>
        </div>
        <div className="text-right">
          <div className="text-sm text-slate-600">発行日: {cfg.issueDate || fmtDate(new Date().toISOString())}</div>
          {cfg.dueDate && <div className="text-sm text-slate-600">支払期限: {cfg.dueDate}</div>}
          <div className="mt-2 text-sm">
            <div className="font-bold">{companyInfo?.name || ''}</div>
            <div className="text-xs text-slate-600">{companyInfo?.address || ''}</div>
            <div className="text-xs text-slate-600">{companyInfo?.phone || ''}</div>
            {companyInfo?.representative && <div className="text-xs text-slate-600 mt-1">代表 {companyInfo.representative}</div>}
            {project.staffName && <div className="text-xs text-slate-600">担当 {project.staffName}</div>}
            {showStamp && companyInfo?.stampImage && (
              <div className="mt-2 flex justify-end"><img src={companyInfo.stampImage} alt="印" className="h-14 w-14 object-contain" /></div>
            )}
          </div>
        </div>
      </div>

      {/* 工事総額 */}
      <div className="border-2 border-slate-800 p-4 mb-6 flex items-center justify-between">
        <span className="text-lg font-bold">工事 税込総額</span>
        <div className="text-right">
          <span className="num text-3xl font-bold">¥{fmt(total)}</span>
          <span className="text-sm text-slate-500 ml-2">({fmt(result.subtotal)} + 消費税 {fmt(result.tax)})</span>
        </div>
      </div>

      {/* 分割テーブル */}
      <h3 className="font-bold text-lg mb-2">お支払い計画</h3>
      <table className="w-full text-sm border border-slate-400 border-collapse mb-6">
        <thead>
          <tr className="bg-slate-100 border-b-2 border-slate-400">
            <th className="px-3 py-2 text-left border-r border-slate-300">名称</th>
            <th className="px-3 py-2 text-right border-r border-slate-300 w-24">割合</th>
            <th className="px-3 py-2 text-right w-40">金額（税込）</th>
          </tr>
        </thead>
        <tbody>
          {splitsWithAmount.map((s, i) => (
            <tr key={i} className="border-b border-slate-200">
              <td className="px-3 py-2 border-r border-slate-200 font-semibold">{s.name}</td>
              <td className="px-3 py-2 text-right border-r border-slate-200 num">
                {s.fixed !== '' && s.fixed !== null && s.fixed !== undefined ? '—' : `${s.pct}%`}
              </td>
              <td className="px-3 py-2 text-right num font-mono">¥{fmt(s.amount)}</td>
            </tr>
          ))}
          <tr className="border-b-4 border-slate-800 bg-slate-100 font-bold">
            <td className="px-3 py-2 border-r border-slate-300">分割合計</td>
            <td className="px-3 py-2 border-r border-slate-300"></td>
            <td className="px-3 py-2 text-right num font-mono">¥{fmt(splitsWithAmount.reduce((s, x) => s + x.amount, 0))}</td>
          </tr>
        </tbody>
      </table>

      {/* ②内訳付き：工事内訳サマリ */}
      {showDetail && (
        <>
          <h3 className="font-bold text-lg mb-2 mt-8">工事内訳（参考）</h3>
          <table className="w-full text-sm border-collapse mb-4">
            <thead>
              <tr className="bg-slate-100 border-b-2 border-slate-400">
                <th className="px-2 py-1.5 text-left">区分</th>
                <th className="px-2 py-1.5 text-right">金額(円)</th>
              </tr>
            </thead>
            <tbody>
              <tr className="border-b border-slate-200"><td className="px-2 py-1.5">本体工事</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.bodyTotal)}</td></tr>
              <tr className="border-b border-slate-200"><td className="px-2 py-1.5">付帯工事</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.sideTotal)}</td></tr>
              <tr className="border-b border-slate-200"><td className="px-2 py-1.5">諸経費</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.overheadTotal)}</td></tr>
              {result.optionsTotal > 0 && <tr className="border-b border-slate-200"><td className="px-2 py-1.5">オプション工事</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.optionsTotal)}</td></tr>}
              {result.roundingAdjust !== 0 && <tr className="border-b border-slate-200" style={{ color: '#C85400' }}><td className="px-2 py-1.5">お値引き（端数調整）</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.roundingAdjust)}</td></tr>}
              <tr className="border-b-2 border-slate-400 font-bold"><td className="px-2 py-1.5">税抜合計</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.subtotal)}</td></tr>
              <tr className="border-b border-slate-300"><td className="px-2 py-1.5">消費税(10%)</td><td className="px-2 py-1.5 text-right num font-mono">{fmt(result.tax)}</td></tr>
              <tr className="border-b-4 border-slate-800 bg-slate-100 font-bold"><td className="px-2 py-1.5">税込総合計</td><td className="px-2 py-1.5 text-right num font-mono">¥{fmt(result.total)}</td></tr>
            </tbody>
          </table>
        </>
      )}

      {cfg.bankInfo && (
        <div className="mt-6 p-4 border border-slate-300 rounded bg-slate-50">
          <div className="text-xs text-slate-500 mb-1">お振込先</div>
          <div className="text-sm font-semibold">{cfg.bankInfo}</div>
        </div>
      )}

      {showStamp && (
        <div className="mt-8 flex justify-end gap-4">
          <div className="border border-slate-400 rounded w-24 h-24 flex flex-col items-center justify-center"><div className="text-xs text-slate-600">承認</div><div className="flex-1"></div></div>
          <div className="border border-slate-400 rounded w-24 h-24 flex flex-col items-center justify-center"><div className="text-xs text-slate-600">確認</div><div className="flex-1"></div></div>
          <div className="border border-slate-400 rounded w-24 h-24 flex flex-col items-center justify-center"><div className="text-xs text-slate-600">担当</div><div className="flex-1"></div></div>
        </div>
      )}

      <div className="mt-6 text-xs text-slate-500 leading-relaxed">
        <p>※ お支払いは上記分割計画に基づき、各時点でご請求申し上げます。</p>
        <p>※ 振込手数料はお客様にてご負担ください。</p>
        {project.baseSnapshot && diffSummary(project, result).hasChanges && (
          <p>※ 本請求は変更後の金額に基づくものです。当初の確定見積（¥{fmt(project.baseSnapshot.totals?.total || 0)}）との差額：¥{fmt(total - (project.baseSnapshot.totals?.total || 0))}</p>
        )}
      </div>
    </div>
  );
}

// ============ 共通モーダル: カテゴリ追加 ============
function CategoryAddModal({ open, title, scope, existingNames, nextCode, onCancel, onConfirm }) {
  const [name, setName] = useState('');
  const [category, setCategory] = useState('本体工事');
  const inputRef = useRef(null);
  useEffect(() => {
    if (open) {
      setName('');
      setCategory('本体工事');
      // 次のティックで autoFocus を効かせる
      setTimeout(() => inputRef.current?.focus(), 30);
    }
  }, [open]);

  if (!open) return null;
  const trimmed = name.trim();
  const canSubmit = trimmed.length > 0;
  const dup = trimmed && existingNames && existingNames.includes(trimmed);

  const submit = () => { if (canSubmit) onConfirm(trimmed, category); };
  const handleKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
    else if (e.key === 'Enter' && canSubmit) { e.preventDefault(); submit(); }
  };

  return (
    <div className="fixed inset-0 bg-slate-900/30 z-50 flex items-center justify-center p-4 no-print"
      onClick={onCancel} onKeyDown={handleKey}>
      <div className="bg-white rounded-md shadow-lg max-w-sm w-full border border-slate-300"
        onClick={e => e.stopPropagation()}>
        {/* ヘッダー */}
        <div className="px-4 py-2.5 border-b border-slate-200 flex items-center justify-between">
          <div>
            <h3 className="text-sm font-bold text-slate-900">{title}</h3>
            {scope && <p className="text-xs text-slate-500 mt-0.5">{scope}</p>}
          </div>
          <button onClick={onCancel} type="button"
            className="text-slate-400 hover:text-slate-700 text-lg leading-none w-6 h-6 flex items-center justify-center"
            aria-label="閉じる">×</button>
        </div>

        {/* 本文 */}
        <div className="px-4 py-3 space-y-3">
          <div>
            <label className="block text-xs text-slate-600 mb-1">カテゴリー名</label>
            <input ref={inputRef} type="text" value={name} onChange={e => setName(e.target.value)}
              onKeyDown={handleKey}
              placeholder="例: 太陽光発電"
              className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500" />
            {dup && (
              <p className="mt-1 text-xs text-slate-500">同名のカテゴリーが既に存在します（別コードで追加されます）</p>
            )}
          </div>

          <div>
            <label className="block text-xs text-slate-600 mb-1">区分</label>
            <select value={category} onChange={e => setCategory(e.target.value)}
              className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500 bg-white">
              <option value="本体工事">本体工事</option>
              <option value="付帯工事">付帯工事</option>
              <option value="諸経費">諸経費</option>
            </select>
          </div>

          <div className="text-xs text-slate-500">
            付与コード: <span className="font-mono text-slate-700">{nextCode}</span>
          </div>
        </div>

        {/* フッター */}
        <div className="px-4 py-2.5 border-t border-slate-200 flex gap-2 justify-end">
          <button onClick={onCancel} type="button"
            className="px-3 py-1 text-sm text-slate-600 hover:text-slate-900">キャンセル</button>
          <button onClick={submit} disabled={!canSubmit} type="button"
            className={`px-3 py-1 text-sm rounded ${canSubmit ? 'bg-slate-800 text-white hover:bg-slate-900' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
            追加
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ マスタ管理 ============
function MasterManager({ masters, setMasters }) {
  return (
    <div>
      <h2 className="text-2xl font-bold text-slate-900 mb-4">マスタ管理</h2>
      <RateMasterEditor masters={masters} setMasters={setMasters} />
    </div>
  );
}

function RateMasterEditor({ masters, setMasters }) {
  const [collapsed, setCollapsed] = useState({});
  const update = (no, key, val) => {
    setMasters(m => ({
      ...m,
      rateMaster: m.rateMaster.map(r => r.no === no ? { ...r, [key]: val } : r)
    }));
  };
  const resetAll = async () => {
    if (!await uiConfirm({ title: '単価マスタを初期値に戻す', message: '単価マスタを初期値（標準仕様）に戻しますか？\n単価・内訳名・規格・有効/無効すべてリセットされます。\n(ユーザー追加項目もすべて削除されます)', confirmText: '初期値に戻す', danger: true })) return;
    setMasters(m => ({ ...m, rateMaster: APP_DATA_INITIAL.rateMaster }));
  };
  const toggleCollapse = (g) => setCollapsed(c => ({ ...c, [g]: !c[g] }));
  const toggleGroupAll = (groupCode, newState) => {
    setMasters(m => ({
      ...m,
      rateMaster: m.rateMaster.map(r => r.categoryGroup === groupCode ? { ...r, disabled: !newState } : r)
    }));
  };
  const addMasterItem = (groupCode, categoryName, categoryType) => {
    // 同カテゴリ内の最大番号を探して+1
    const sameGroup = masters.rateMaster.filter(r => r.categoryGroup === groupCode);
    let maxNum = 0;
    sameGroup.forEach(r => {
      const m = String(r.no).match(/-(\d+)$/);
      if (m) {
        const n = parseInt(m[1], 10);
        if (n > maxNum) maxNum = n;
      }
    });
    const newItem = {
      no: `${groupCode}-${maxNum + 1}`,
      name: '新規項目',
      spec: '',
      quantityFormula: '1',  // 自動計算なし(固定で1)
      unit: '式',
      price: 0,
      category: categoryType,
      categoryGroup: groupCode,
      categoryName: categoryName,
      userAdded: true  // ユーザー追加マーク
    };
    setMasters(m => ({ ...m, rateMaster: [...m.rateMaster, newItem] }));
  };

  // ユーザー定義カテゴリーを新規追加 (英字記号は自動採番) — 入力はモーダルで受ける
  const [addCatModalOpen, setAddCatModalOpen] = useState(false);
  const addMasterCategoryNextCode = useMemo(
    () => nextAvailableCategoryCode(masters.rateMaster.map(r => r.categoryGroup)),
    [masters.rateMaster]
  );
  const addMasterCategoryExistingNames = useMemo(
    () => [...new Set(masters.rateMaster.map(r => r.categoryName))],
    [masters.rateMaster]
  );
  const handleAddMasterCategoryConfirm = (trimmed, category) => {
    if (!trimmed) return;
    const code = nextAvailableCategoryCode(masters.rateMaster.map(r => r.categoryGroup));
    const newItem = {
      no: `${code}-1`,
      name: '新規項目',
      spec: '',
      quantityFormula: '1',
      unit: '式',
      price: 0,
      category,
      categoryGroup: code,
      categoryName: trimmed,
      userAdded: true
    };
    setMasters(m => ({ ...m, rateMaster: [...m.rateMaster, newItem] }));
    setAddCatModalOpen(false);
  };
  const deleteMasterItem = async (no) => {
    const item = masters.rateMaster.find(r => r.no === no);
    if (!item) return;
    if (!item.userAdded) {
      await uiAlert('初期項目は削除できません。「有効」チェックを外して非表示にしてください。');
      return;
    }
    if (!await uiConfirm({ title: '項目の削除', message: `項目「${item.no} ${item.name}」を削除しますか？\n(ユーザー追加項目のみ削除可能)`, confirmText: '削除する', danger: true })) return;
    setMasters(m => ({ ...m, rateMaster: m.rateMaster.filter(r => r.no !== no) }));
  };

  // カテゴリ別グループ化
  const groups = useMemo(() => {
    const g = {};
    masters.rateMaster.forEach(item => {
      const key = item.categoryGroup;
      if (!g[key]) g[key] = { categoryGroup: key, categoryName: item.categoryName, category: item.category, items: [] };
      g[key].items.push(item);
    });
    // 各グループ内で「有効な項目」に対して表示用連番を付与
    Object.values(g).forEach(grp => {
      let n = 0;
      grp.items.forEach(item => {
        if (!item.disabled) {
          n++;
          item._displayNo = `${grp.categoryGroup}-${n}`;
        } else {
          item._displayNo = item.no; // 無効化項目は元の番号のまま薄く表示
        }
      });
    });
    // 区分(本体/付帯/諸経費)ごとに並べ、新規追加カテゴリは該当区分の末尾に配置
    return sortGroupsBySection(Object.values(g));
  }, [masters.rateMaster]);

  const totalItems = masters.rateMaster.length;
  const activeItems = masters.rateMaster.filter(r => !r.disabled).length;

  return (
    <div>
      <div className="bg-blue-50 border-l-4 border-blue-400 p-3 mb-3 rounded text-xs text-blue-900">
        📦 <strong>マスタの変更は「新しく作る見積」と「マスタを最新に更新した既存見積」にだけ反映されます。</strong>既存の見積（=作成済みの見積）にはそのままでは影響しません。<br />
        既存の見積を最新マスタで再計算したい場合は、その見積を開いて画面上部の「🔄 マスタを最新に更新」ボタンを押してください。手動編集した数量・単価・カスタム追加項目は保護されます。<br />
        元に戻すには「初期値に戻す」ボタンで標準仕様に復旧できます（マスタのみ、既存見積には影響しません）。
      </div>
      <div className="bg-pink-50 border-l-4 border-pink-400 p-3 mb-3 rounded text-xs text-pink-900">
        ★ <strong>ユーザー追加項目について:</strong> 各カテゴリの「＋ 内訳追加」で新しい項目を、画面右上の「＋ 新規カテゴリ追加」で新しいカテゴリーを追加できます。追加項目は <strong>ピンク背景</strong> と <strong>★マーク</strong> で表示されます。<br />
        🆕 <strong>新規カテゴリーの英字コード（A〜AB のあと AC, AD, ...）は自動採番</strong>です。重複や入力ミスは発生しません。カテゴリー名は日本語で自由に付けられます（例: 太陽光発電、ガレージ、外構造作）。<br />
        ⚠️ 追加項目は <strong>規模(坪数・面積など)に応じた自動数量計算は適用されません</strong>。見積編集の内訳明細で数量を手動入力してください（初期値は「1 式」）。<br />
        単位欄も自由に編集できます。追加項目のみ「×」ボタンで削除可能（初期項目は削除不可、「有効」を外して非表示にしてください）。
      </div>
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <p className="text-sm text-slate-600">
          単価マスタ: 有効 <strong>{activeItems}</strong> / 全 {totalItems} 内訳
        </p>
        <div className="flex items-center gap-2 flex-wrap">
          <button onClick={() => setAddCatModalOpen(true)}
            className="text-xs px-3 py-1 border border-pink-400 text-pink-700 bg-pink-50 rounded hover:bg-pink-100 font-bold"
            title="新しいカテゴリーを追加(英字コードは自動採番)">＋ 新規カテゴリ追加</button>
          <button onClick={resetAll} className="text-xs px-3 py-1 border border-slate-400 text-slate-700 rounded hover:bg-slate-100">初期値に戻す</button>
        </div>
      </div>
      <CategoryAddModal open={addCatModalOpen}
        title="新規カテゴリー追加"
        scope="マスタ管理（全見積に反映 / 既存見積は影響なし）"
        existingNames={addMasterCategoryExistingNames}
        nextCode={addMasterCategoryNextCode}
        onCancel={() => setAddCatModalOpen(false)}
        onConfirm={handleAddMasterCategoryConfirm} />
      <div className="space-y-3">
        {groups.map(g => {
          const isCollapsed = collapsed[g.categoryGroup];
          const catColor = g.category === '本体工事' ? 'bg-blue-100 text-blue-900 border-blue-300' :
                           g.category === '付帯工事' ? 'bg-amber-100 text-amber-900 border-amber-300' :
                           'bg-green-100 text-green-900 border-green-300';
          const groupActive = g.items.filter(i => !i.disabled).length;
          const groupTotal = g.items.length;
          return (
            <div key={g.categoryGroup} className="bg-white border border-slate-200 rounded-lg overflow-hidden">
              <div className={`${catColor} px-3 py-2 border-b flex items-center justify-between flex-wrap gap-2`}>
                <div className="flex items-center gap-2">
                  <button onClick={() => toggleCollapse(g.categoryGroup)} className="text-xs hover:bg-white/30 rounded px-1">
                    {isCollapsed ? '▶' : '▼'}
                  </button>
                  <span className="font-mono font-bold text-sm">{g.categoryGroup}.</span>
                  <span className="font-bold text-sm">{g.categoryName}</span>
                  <span className="text-xs ml-2">有効 {groupActive}/{groupTotal} 件</span>
                </div>
                <div className="flex items-center gap-1 flex-wrap">
                  <button onClick={() => addMasterItem(g.categoryGroup, g.categoryName, g.category)}
                    className="text-xs px-2 py-0.5 border border-current bg-white/50 rounded hover:bg-white">＋ 内訳追加</button>
                  <button onClick={() => toggleGroupAll(g.categoryGroup, true)}
                    className="text-xs px-2 py-0.5 border border-current rounded hover:bg-white/30">全有効</button>
                  <button onClick={() => toggleGroupAll(g.categoryGroup, false)}
                    className="text-xs px-2 py-0.5 border border-current rounded hover:bg-white/30">全無効</button>
                </div>
              </div>
              {!isCollapsed && (
                <div className="overflow-x-auto">
                  <table className="w-full text-xs" style={{tableLayout: 'fixed'}}>
                    <colgroup>
                      <col style={{width:'40px'}} />
                      <col style={{width:'56px'}} />
                      <col style={{width:'180px'}} />
                      <col />
                      <col style={{width:'112px'}} />
                      <col style={{width:'60px'}} />
                      <col style={{width:'40px'}} />
                    </colgroup>
                    <thead className="bg-slate-50">
                      <tr className="text-slate-600 text-left border-b border-slate-200">
                        <th className="px-2 py-1.5 text-center">有効</th>
                        <th className="px-2 py-1.5">No.</th>
                        <th className="px-2 py-1.5">内訳名</th>
                        <th className="px-2 py-1.5">規格</th>
                        <th className="px-2 py-1.5 text-right">単価</th>
                        <th className="px-2 py-1.5">単位</th>
                        <th className="px-2 py-1.5"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {g.items.map(item => {
                        const isActive = !item.disabled;
                        const isUserAdded = !!item.userAdded;
                        return (
                          <tr key={item.no} className={`border-t border-slate-100 ${!isActive ? 'opacity-40' : ''} ${isUserAdded ? 'bg-pink-50' : ''}`}>
                            <td className="px-2 py-1 text-center">
                              <input type="checkbox" checked={isActive}
                                onChange={e => update(item.no, 'disabled', !e.target.checked)} />
                            </td>
                            <td className="px-2 py-1 font-mono">
                              {item._displayNo || item.no}
                              {isUserAdded && <span className="ml-1 text-pink-600" title="ユーザー追加項目">★</span>}
                            </td>
                            <td className="px-2 py-1">
                              <input type="text" value={item.name}
                                onChange={e => update(item.no, 'name', e.target.value)}
                                className="w-full border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-1.5 py-0.5 truncate" />
                            </td>
                            <td className="px-2 py-1 text-slate-700">
                              <input type="text" value={item.spec || ''}
                                onChange={e => update(item.no, 'spec', e.target.value)}
                                className="w-full border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-1.5 py-0.5 truncate" />
                            </td>
                            <td className="px-2 py-1 text-right num font-mono">
                              <input type="number" value={item.price} onChange={e => update(item.no, 'price', e.target.value)}
                                className="w-24 text-right border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-1.5 py-0.5 num font-mono" />
                            </td>
                            <td className="px-2 py-1">
                              {isUserAdded ? (
                                <input type="text" value={item.unit}
                                  onChange={e => update(item.no, 'unit', e.target.value)}
                                  className="w-full border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-1 py-0.5" />
                              ) : (
                                item.unit
                              )}
                            </td>
                            <td className="px-2 py-1 text-center">
                              {isUserAdded && (
                                <button onClick={() => deleteMasterItem(item.no)}
                                  className="text-xs text-red-600 hover:bg-red-50 rounded px-1" title="この項目を削除">×</button>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// 既存スマート見積（変更見積なし版）から取り込んだ見積に、変更見積版の新フィールドを補完する。
// これにより旧ツールのエクスポートJSONをそのまま読み込んでも壊れない（取り込み時は必ず「作成中」から開始）。
function normalizeImportedProject(p) {
  return {
    excludedItems: [], customItems: [], manualPrices: {}, manualQuantities: {}, options: [],
    printFormat: 'standard', rounding: { unit: 0, amount: 0 },
    ...p,
    // 変更見積版の状態は取り込み時に必ずリセット（作成中から）
    status: 'draft',
    finalizedAt: null,
    finalizedTotal: null,
    baseSnapshot: null,
    printKind: null,
    invoiceConfig: p.invoiceConfig || {
      issueDate: '', dueDate: '', bankInfo: '',
      splits: [
        { name: '契約金', pct: 10, fixed: '' },
        { name: '着手金', pct: 30, fixed: '' },
        { name: '上棟金', pct: 30, fixed: '' },
        { name: '最終金', pct: 30, fixed: '' }
      ]
    }
  };
}

function Settings({ state, setState, masters, setMasters }) {
  const exportAll = () => {
    const exported = { ...state, masters, _exportedAt: new Date().toISOString(), _version: '1.0' };
    downloadJson(exported, `見積データ_全体_${fmtDate(new Date().toISOString())}.json`);
  };
  const exportProject = (pid) => {
    const p = state.projects.find(x => x.id === pid); if (!p) return;
    downloadJson({ project: p, masters, _exportedAt: new Date().toISOString(), _version: '1.0' }, `見積_${p.propertyName ? p.propertyName + '_' : ''}${p.name}_${fmtDate(new Date().toISOString())}.json`);
  };
  const importAll = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const obj = JSON.parse(ev.target.result);
        if (obj.project && !obj.projects) {
          // 単一見積（既存スマート見積のエクスポートもこの形）
          if (!await uiConfirm({ title: '見積の取り込み', message: `見積「${obj.project.name}」を取り込みますか？\n\n※ 取り込んだ見積は「作成中」から始まります（確定すると変更見積が作れます）。`, confirmText: '取り込む' })) return;
          const p = normalizeImportedProject({ ...obj.project, id: uuid(), name: obj.project.name + ' (取込)', updatedAt: new Date().toISOString() });
          setState(s => ({ ...s, projects: [p, ...s.projects] }));
          // 単価マスタも引き継ぐ（旧ツールと項目体系が同じ場合）
          if (obj.masters && (!state.masters || (masters.rateMaster || []).length === 0)) setMasters(obj.masters);
          await uiAlert('取り込みました。物件一覧に追加されています。');
        } else {
          if (!await uiConfirm({ title: 'データの上書き取り込み', message: '現在のデータを、ファイルの内容で上書きします。よろしいですか？\n（取り込んだ見積はすべて「作成中」から始まります）', confirmText: '上書きする', danger: true })) return;
          if (obj.projects) setState(s => ({
            projects: obj.projects.map(normalizeImportedProject),
            properties: obj.properties || s.properties || [],  // 物件のみ登録(見積0件)の情報も復元
            companyInfo: obj.companyInfo || s.companyInfo
          }));
          if (obj.masters) setMasters(obj.masters);
          await uiAlert('取り込みました。');
        }
      } catch (err) { await uiAlert('JSONの読み込みに失敗: ' + err.message); }
    };
    reader.readAsText(file);
  };
  const setCompany = (key, val) => setState(s => ({ ...s, companyInfo: { ...s.companyInfo, [key]: val } }));
  const resetAll = async () => {
    if (!await uiConfirm({ title: 'すべてのデータを初期化', message: 'すべてのデータを初期化しますか？（見積・マスタ含めて全消去）', confirmText: '初期化する', danger: true })) return;
    if (!await uiConfirm({ title: '最終確認', message: '本当にすべて消去しますか？\nこの操作は取り消せません。', confirmText: 'すべて消去する', danger: true })) return;
    localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_MASTER_KEY);
    location.reload();
  };

  return (
    <div>
      <h2 className="text-2xl font-bold text-slate-900 mb-4">設定</h2>
      <div className="space-y-4">
        <div className="bg-white border border-slate-200 rounded-lg p-5">
          <h3 className="font-bold text-slate-900 mb-3">会社情報（見積書に表示）</h3>
          <div className="space-y-3">
            <TextField label="会社名" value={state.companyInfo?.name} onChange={v => setCompany('name', v)} />
            <TextField label="住所" value={state.companyInfo?.address} onChange={v => setCompany('address', v)} />
            <TextField label="電話" value={state.companyInfo?.phone} onChange={v => setCompany('phone', v)} />
            <TextField label="メールアドレス" value={state.companyInfo?.email} onChange={v => setCompany('email', v)} />
            <TextField label="代表者" value={state.companyInfo?.representative} onChange={v => setCompany('representative', v)} />
          </div>
          <div className="mt-4 pt-4 border-t border-slate-200">
            <h4 className="font-semibold text-slate-700 mb-2 text-sm">🖋 印鑑画像（任意・正式見積書に自動挿入）</h4>
            <p className="text-xs text-slate-500 mb-2">透過PNG推奨。アップロードすると「③ 正式見積書」の押印欄に自動表示されます。</p>
            <div className="flex items-center gap-3 flex-wrap">
              {state.companyInfo?.stampImage && (
                <div className="border border-slate-300 rounded p-1 bg-white">
                  <img src={state.companyInfo.stampImage} alt="印鑑" className="h-16 w-16 object-contain" />
                </div>
              )}
              <input type="file" accept="image/*"
                onChange={e => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  if (file.size > 500 * 1024) {
                    uiAlert('画像サイズが大きすぎます。500KB以下の画像を使ってください。');
                    return;
                  }
                  const reader = new FileReader();
                  reader.onload = ev => setCompany('stampImage', ev.target.result);
                  reader.readAsDataURL(file);
                }}
                className="text-xs" />
              {state.companyInfo?.stampImage && (
                <button onClick={() => setCompany('stampImage', '')}
                  className="text-xs px-3 py-1 border border-red-300 text-red-600 rounded hover:bg-red-50">削除</button>
              )}
            </div>
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-bold mb-3">📤 エクスポート</h3>
            <button onClick={exportAll} className="w-full text-left px-3 py-2 border border-slate-300 rounded text-sm hover:bg-slate-50 mb-2">全データJSONエクスポート（バックアップ）</button>
            <div className="text-xs text-slate-500 mt-3 mb-2">単一見積エクスポート:</div>
            <div className="space-y-1 max-h-40 overflow-y-auto">
              {state.projects.map(p => (
                <button key={p.id} onClick={() => exportProject(p.id)}
                  className="block w-full text-left px-3 py-1.5 border border-slate-200 rounded text-xs hover:bg-slate-50 truncate">
                  📄 {p.propertyName ? `${p.propertyName} / ` : ''}{p.name}
                </button>
              ))}
              {state.projects.length === 0 && <div className="text-xs text-slate-400">見積がありません</div>}
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-bold mb-3">📥 インポート</h3>
            <label className="block">
              <input type="file" accept=".json" onChange={importAll} className="hidden" />
              <span className="block w-full text-left px-3 py-2 border border-slate-300 rounded text-sm hover:bg-slate-50 cursor-pointer">JSONファイルを選択（全体/単一見積 自動判定）</span>
            </label>
            <div className="text-xs text-slate-500 mt-3 leading-relaxed">
              全データ: 既存を上書き<br/>単一見積: 既存に追加（新IDで取り込み）
            </div>
            <div className="text-xs mt-3 p-2 rounded border" style={{ backgroundColor: '#F8FAFC', borderColor: '#1B2B4B33', color: '#1B2B4B' }}>
              💡 <strong>既存のスマート見積からの移行</strong>：元のツールの「設定 → エクスポート」で保存したJSONを、ここで選ぶだけで取り込めます。取り込んだ見積は「作成中」から始まり、確定すると変更見積が作れます。
            </div>
          </div>
        </div>
        <div className="bg-red-50 border border-red-200 rounded-lg p-5">
          <h3 className="font-bold text-red-900 mb-2">⚠️ データ初期化</h3>
          <p className="text-xs text-red-700 mb-3">見積・マスタ含めて全削除します。必ずバックアップしてから実行してください。</p>
          <button onClick={resetAll} className="px-3 py-1.5 border border-red-400 text-red-700 rounded text-sm hover:bg-red-100">全データを初期化</button>
        </div>
      </div>
    </div>
  );
}

function TextField({ label, value, onChange }) {
  return (
    <div>
      <label className="text-xs text-slate-600 font-semibold">{label}</label>
      <input type="text" value={value || ''} onChange={e => onChange(e.target.value)}
        className="block mt-1 border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-3 py-2 w-full text-sm" />
    </div>
  );
}

function downloadJson(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
